---
# gcs-pipeline-k8s/pipeline.yaml
# Smoke-test pipeline for the GCS backend. Writes to a gs:// warehouse
# registered against an in-cluster fake-gcs-server.
#
# This template is intentionally minimal: one extract stage, one table,
# same shape as examples/k8s/simple-pipeline.yaml. The only GCS-specific
# aspect is the warehouse registered via `pipeline-api admin
# lakekeeper-bootstrap --gcs-credential-type=service-account-key`
# before the run (bootstrap wiring tracked in run.sh).
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: gcs-smoke
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          image: datuplet/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
            table_name: "posts"
          outputs:
            tables:
              - name: posts
                bucket: gcs-smoke-staging
                writeMode: FULL_LOAD

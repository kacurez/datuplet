---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-gcs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-gcs-server
  template:
    metadata:
      labels:
        app: fake-gcs-server
    spec:
      containers:
      - name: fake-gcs-server
        image: fsouza/fake-gcs-server:1.49
        args:
        - "-scheme"
        - "http"
        - "-public-host"
        - "fake-gcs-server.datuplet.svc.cluster.local:4443"
        ports:
        - containerPort: 4443
---
apiVersion: v1
kind: Service
metadata:
  name: fake-gcs-server
spec:
  selector:
    app: fake-gcs-server
  ports:
  - port: 4443
    targetPort: 4443

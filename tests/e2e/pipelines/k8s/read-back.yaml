---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-read-back"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          image: datuplet/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
          outputs:
            defaultBucket: "{{.RunPrefix}}-readback"
            defaultWriteMode: FULL_LOAD

    - name: read
      components:
        - name: stdout-writer
          image: datuplet/stdout-writer:latest
          inputs:
            tables:
              - bucket: "{{.RunPrefix}}-readback"
                table: data
          config:
            format: json
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-read-back-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-read-back"

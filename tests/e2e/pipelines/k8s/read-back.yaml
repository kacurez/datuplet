name: "{{.RunPrefix}}-read-back"
stages:
  - name: extract
    components:
      - name: json-extractor
        component: http-json-extractor
        version: dev
        config:
          url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
        outputs:
          defaultBucket: "{{.RunPrefix}}-readback"
          defaultWriteMode: FULL_LOAD

  - name: read
    components:
      - name: stdout-writer
        component: stdout-writer
        version: dev
        inputs:
          tables:
            - bucket: "{{.RunPrefix}}-readback"
              table: data
        config:
          format: json

# RFC 026 P2 Task R11: schema-invalid scenario. data-generator is pinned to
# the STABLE v0.0.1 registration (framework/components_bootstrap.go), which
# carries the real config schema (additionalProperties:false at every
# level) — the "dev" prerelease registration is deliberately permissive and
# cannot exercise this path. `bogusUnknownKey` violates the table-item
# schema's additionalProperties:false, so admission rejects this Pipeline
# before any Job is built: FailedUser, zero pods.
name: "{{.RunPrefix}}-error-schema-invalid"
stages:
  - name: extract
    components:
      - name: data-generator
        component: data-generator
        version: v0.0.1
        config:
          tables:
            - name: bad
              bogusUnknownKey: "not part of the registered schema"
              random:
                schema: {id: int}
                limit: {rowsCount: 10}
        outputs:
          defaultBucket: "{{.RunPrefix}}-schema-invalid"
          defaultWriteMode: APPEND

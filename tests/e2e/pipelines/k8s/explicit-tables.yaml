---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-explicit-tables"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          component: http-json-extractor
          version: dev
          config:
            url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
            table_name: "posts"
          outputs:
            tables:
              - name: posts
                bucket: "{{.RunPrefix}}-staging"
                writeMode: FULL_LOAD
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-explicit-tables-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-explicit-tables"

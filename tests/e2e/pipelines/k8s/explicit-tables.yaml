name: "{{.RunPrefix}}-explicit-tables"
stages:
  - name: extract
    components:
      - name: json-extractor
        component: http-json-extractor
        version: dev
        config:
          url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
          table_name: "posts"
        outputs:
          tables:
            - name: posts
              bucket: "{{.RunPrefix}}-staging"
              writeMode: FULL_LOAD

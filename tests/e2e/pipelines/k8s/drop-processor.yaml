---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-drop-processor"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          image: datuplet/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
          outputs:
            defaultBucket: "{{.RunPrefix}}-raw"
            defaultWriteMode: FULL_LOAD
            processors:
              - type: drop
                columns:
                  - title
                  - body
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-drop-processor-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-drop-processor"

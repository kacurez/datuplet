---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-secrets-happy"
  namespace: datuplet
spec:
  # Framework creates a Kubernetes Secret named <RunPrefix>-secrets before apply;
  # the gateway sidecar mounts it at /var/run/secrets/datuplet and resolves
  # $[api_token] in component config below.
  secretsRef:
    name: "{{.RunPrefix}}-secrets"
  stages:
    - name: extract
      components:
        - name: json-extractor
          image: datuplet/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
            # See Docker template above for rationale; extra field is tolerated.
            api_token: "$[api_token]"
          outputs:
            defaultBucket: "{{.RunPrefix}}-api"
            defaultWriteMode: FULL_LOAD
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-secrets-happy-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-secrets-happy"

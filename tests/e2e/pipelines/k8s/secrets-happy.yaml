---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-secrets-happy"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          component: http-json-extractor
          version: dev
          config:
            url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
            # See Docker template above for rationale; extra field is tolerated.
            api_token: "$[api_token]"
          outputs:
            defaultBucket: "{{.RunPrefix}}-api"
            defaultWriteMode: FULL_LOAD
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-secrets-happy-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-secrets-happy"

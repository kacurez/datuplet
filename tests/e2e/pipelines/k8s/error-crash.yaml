name: "{{.RunPrefix}}-error-crash"
stages:
  - name: transform
    components:
      - name: sql-transform
        component: sql-transform
        version: dev
        inputs:
          tables:
            - bucket: "{{.RunPrefix}}-nonexistent"
              table: products
        outputs:
          tables:
            - name: result
              bucket: "{{.RunPrefix}}-crash"
              writeMode: FULL_LOAD
        config:
          sql: "SELECT * FROM products"

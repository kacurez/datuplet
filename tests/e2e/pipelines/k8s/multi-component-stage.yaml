name: "{{.RunPrefix}}-multi-component-stage"
stages:
  - name: extract
    components:
      - name: posts-extractor
        component: http-json-extractor
        version: dev
        config:
          url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
          table_name: "posts"
        outputs:
          tables:
            - name: posts
              bucket: "{{.RunPrefix}}-multi"
              writeMode: FULL_LOAD
      - name: users-extractor
        component: http-json-extractor
        version: dev
        config:
          url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/users"
          table_name: "users"
        outputs:
          tables:
            - name: users
              bucket: "{{.RunPrefix}}-multi"
              writeMode: FULL_LOAD

---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-full-load-mode"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          component: http-json-extractor
          version: dev
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
          outputs:
            defaultBucket: "{{.RunPrefix}}-raw"
            defaultWriteMode: FULL_LOAD
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-full-load-mode-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-full-load-mode"

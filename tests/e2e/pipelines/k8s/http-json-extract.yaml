---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-http-json-extract"
  namespace: datuplet
spec:
  stages:
    - name: extract
      components:
        - name: json-extractor
          image: datuplet/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
          outputs:
            defaultBucket: "{{.RunPrefix}}-api"
            defaultWriteMode: FULL_LOAD
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-http-json-extract-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-http-json-extract"
  parameters: {}

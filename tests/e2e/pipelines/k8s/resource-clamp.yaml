# Over-max resources fixture. The data-generator@v0.0.1 component sets limits
# ABOVE the registry max (cpu 4 > 2, memory 1Gi > 512Mi).
#
# RFC 027 E2: the e2e harness now submits pipelines through pipeline-api's doc
# PUT, which enforces the resource ceiling up front — so
# TestResources_ClampedAtAdmission asserts a 400 PRE-FLIGHT REJECTION naming
# resources.limits.cpu/memory ("exceeds registry max"), NOT the old
# controller clamp-and-proceed-to-success. The controller's admission-time
# clamp (RFC 026 §4.4 Layer 2 — defense-in-depth for the removed direct-kubectl
# path) is no longer reachable through this API-driven harness; it is covered
# by pkg/k8s/controllers unit tests instead.
#
# NOTE (RFC 027 E2): the PipelineDoc resources shape expresses only flat limits
# (memory/cpu); the old explicit requests block is not represented here.
#
# The generator is throttled (rowInsertSpeed) against a large rowsCount with
# a short timeoutInSeconds so it stays Running long enough for the test to
# read the clamp note off status.message before the success path overwrites
# it — then exits cleanly (Succeeded) on the timeout, exactly like the freeze
# scenario.
name: "{{.RunPrefix}}-resource-clamp"
stages:
  - name: generate
    components:
      - name: gen
        component: data-generator
        version: v0.0.1
        config:
          tables:
            - name: rc
              rowInsertSpeed: 500
              random:
                schema: {id: int}
                limit:
                  rowsCount: 100000000
                  timeoutInSeconds: 20
        resources:
          cpu: "4"
          memory: 1Gi
        outputs:
          defaultBucket: "{{.RunPrefix}}-resource-clamp"
          defaultWriteMode: APPEND

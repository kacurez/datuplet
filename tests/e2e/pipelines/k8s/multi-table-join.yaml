---
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: "{{.RunPrefix}}-multi-table-join"
  namespace: datuplet
spec:
  stages:
    # Stage 1: Extract posts and users from public API
    - name: extract
      components:
        - name: posts-extractor
          component: http-json-extractor
          version: dev
          config:
            url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/posts"
            table_name: "posts"
          outputs:
            tables:
              - name: posts
                bucket: "{{.RunPrefix}}-raw"
                writeMode: FULL_LOAD
        - name: users-extractor
          component: http-json-extractor
          version: dev
          config:
            url: "http://e2e-http-fixture.datuplet-e2e.svc.cluster.local/users"
            table_name: "users"
          outputs:
            tables:
              - name: users
                bucket: "{{.RunPrefix}}-raw"
                writeMode: FULL_LOAD

    # Stage 2: SQL join posts with users
    - name: transform
      components:
        - name: sql-transform
          component: sql-transform
          version: dev
          inputs:
            tables:
              - bucket: "{{.RunPrefix}}-raw"
                table: posts
              - bucket: "{{.RunPrefix}}-raw"
                table: users
          outputs:
            tables:
              - name: post_details
                bucket: "{{.RunPrefix}}-joined"
                writeMode: FULL_LOAD
          config:
            sql: |
              CREATE TABLE post_details AS
              SELECT
                p.id AS post_id,
                p.title,
                u.name AS author_name,
                u.email AS author_email
              FROM posts p
              JOIN users u ON p."userId" = u.id
              ORDER BY p.id;
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: "{{.RunPrefix}}-multi-table-join-run"
  namespace: datuplet
spec:
  pipelineRef:
    name: "{{.RunPrefix}}-multi-table-join"

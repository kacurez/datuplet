name: "{{.RunPrefix}}-error-bad-config"
stages:
  - name: extract
    components:
      - name: data-generator
        component: data-generator
        version: dev
        config:
          tables:
            - name: bad
              random:
                schema: {id: int}
                limit: {rowsCount: 10}
                userErrorMessage: "simulated user error: bad config"
        outputs:
          defaultBucket: "{{.RunPrefix}}-err"
          defaultWriteMode: APPEND

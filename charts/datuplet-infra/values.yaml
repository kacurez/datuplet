# charts/datuplet-infra/values.yaml

# Chart-global tolerations applied to the chart's own pod-spec templates
# (keygen Job, openfga-dsn Job) AND to the CNPG Postgres Cluster CR's
# spec.affinity.tolerations (which CNPG propagates to spawned postgres
# pods). NOT applied to the OpenFGA subchart — set openfga.tolerations
# separately for that.
#
# Example (ARM node pool with kubernetes.io/arch=arm64:NoSchedule taint):
#   --set-json 'tolerations=[{"key":"kubernetes.io/arch","operator":"Equal","value":"arm64","effect":"NoSchedule"}]'
tolerations: []

# tag "" resolves to the chart appVersion; local dev overrides via
# tests/local/values-local-app.yaml.
image:
  pullPolicy: IfNotPresent
  pullSecrets: []
  pipelineApi:
    repository: ghcr.io/kacurez/pipeline-api
    tag: ""

bootstrap:
  externalImages:
    # Bitnami retired versioned bitnami/kubectl tags; the bitnamilegacy
    # replacement images use dash as /bin/sh, which lacks `set -o pipefail`
    # and breaks the bootstrap Job scripts below. This is a multi-arch
    # kubectl toolbox whose busybox ash supports pipefail (verified
    # amd64+arm64).
    kubectl: "alpine/k8s:1.31.12"
    openfgaCli: "openfga/cli:v0.6.2"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

pipelineApi:
  signingKey:
    secretName: ""        # rendered in _helpers.tpl
    existingSecret: ""    # operator-supplied override

# Note: The `cloudnative-pg` subchart lives in charts/datuplet-operators/ because its
# admission webhooks must be ready before the Cluster CR is applied (operator Pod not
# Ready → no webhook endpoints → admission rejected). Install datuplet-operators first.
# The Cluster CR (templates/postgres/cluster.yaml) is created here and reconciled by
# the operator running in datuplet-operators.

# Subchart toggles
openfga:
  enabled: true
  fullnameOverride: openfga
  datastore:
    engine: postgres
    uriSecret: openfga-pg-uri
    # Use initContainer (not job) — `migrationType: job` makes openfga's
    # wait-for-migration init wait on a Job that's a post-install hook,
    # which deadlocks helm install --wait (main resources blocked from
    # Ready until post-install hook fires, but post-install hook fires
    # only after main resources Ready). The existing charts/datuplet/
    # chart documents this exact gotcha.
    migrationType: initContainer
    # CNPG ships with max_connections=100 and reserves 3 for superusers, so
    # only 97 slots are available cluster-wide. OpenFGA's default pool is
    # 30 conns × replicas — 3 replicas would consume 90 slots and starve
    # pipeline-api migrations + lakekeeper. Cap at 10/5 so all replicas
    # together stay well under half the available pool.
    # See RFC 019 v0.2.1 deploy notes (kacurez-labs live test, 2026-05-19).
    maxOpenConns: 10
    maxIdleConns: 5
  authn:
    method: preshared
    preshared:
      # Hardcoded to the default release name (datuplet-infra). Operators
      # using a different release name should override via --set
      # openfga.authn.preshared.keysSecret=<release>-openfga-api-key. Subchart
      # values can't reference parent Release.Name. The Secret is created by
      # the keygen Job with key 'keys'.
      keysSecret: openfga-api-key
  # The playground UI only supports authn.method=none; with preshared it
  # panics on startup with "the playground only supports authn method 'none'".
  # Disable it — we use authn=preshared in production-shape installs.
  playground:
    enabled: false
minio:
  enabled: true
  fullnameOverride: minio
  podLabels:
    app.kubernetes.io/part-of: datuplet
    app.kubernetes.io/name: minio
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi
  rootUser: datuplet
  # `buckets` (not `defaultBuckets`) is the official charts.min.io/ chart's
  # field — the minio-post-job creates each entry via mc at install time.
  buckets:
    - name: datuplet
      policy: none
      purge: false
  # Match existing charts/datuplet/ resource request — minio's default
  # request of 16Gi memory exceeds OrbStack's node capacity.
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 2,    memory: 2Gi }

# Lakekeeper lives in charts/datuplet-lakekeeper (Phase 4) rather than here
# because lakekeeper fetches OIDC discovery from pipeline-api at startup,
# so it must start after pipeline-api (Phase 3). pg-lakekeeper /
# pg-lakekeeper-pw Secrets are created in this chart's keygen-job and consumed
# cross-phase (same pattern as pg-pipeline-api).

postgres:
  cluster:
    instances: 1
    storageSize: 5Gi

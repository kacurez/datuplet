# charts/datuplet-infra/Chart.yaml
apiVersion: v2
name: datuplet-infra
description: Datuplet infrastructure layer — CNPG Postgres Cluster, OpenFGA, MinIO, NetworkPolicies, and FGA model bootstrap. Requires datuplet-operators to be installed first.
type: application
version: 0.1.0
appVersion: "1.0"
home: https://github.com/kacurez/datuplet
sources:
  - https://github.com/kacurez/datuplet
maintainers:
  - name: kacurez
    email: tomas.kacur@keboola.com

dependencies:
  - name: openfga
    version: "0.3.3"
    repository: https://openfga.github.io/helm-charts
    condition: openfga.enabled
  - name: minio
    version: "~5.4.0"
    repository: https://charts.min.io/
    condition: minio.enabled

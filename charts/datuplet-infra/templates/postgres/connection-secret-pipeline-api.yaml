# charts/datuplet-infra/templates/postgres/connection-secret-pipeline-api.yaml
{{- /*
Chart-rendered connection Secret for pipeline-api. CNPG's managed.roles[] does
NOT auto-generate per-role connection Secrets — only the bootstrap user gets
the `<cluster>-app` Secret. So we render host/port/db/user here; password is
referenced separately via envFrom in the consuming Deployment.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datuplet-infra.prefix" . }}pg-pipeline-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_HOST: "{{ include "datuplet-infra.prefix" . }}pg-rw.{{ .Release.Namespace }}.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "pipeline_api"
  POSTGRES_USER: "pipeline_api_user"

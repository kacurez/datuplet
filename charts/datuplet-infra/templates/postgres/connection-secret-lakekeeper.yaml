# charts/datuplet-infra/templates/postgres/connection-secret-lakekeeper.yaml
{{- /*
Chart-rendered connection Secret for lakekeeper. CNPG's managed.roles[] does
NOT auto-generate per-role connection Secrets — only the bootstrap user gets
the `<cluster>-app` Secret. So we render host/port/db/user here; password is
referenced separately via envFrom in the consuming Deployment.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datuplet-infra.prefix" . }}pg-lakekeeper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_HOST: "{{ include "datuplet-infra.prefix" . }}pg-rw.{{ .Release.Namespace }}.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "lakekeeper"
  POSTGRES_USER: "lakekeeper_user"

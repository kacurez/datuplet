# charts/datuplet-infra/templates/keygen-rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "datuplet-infra.prefix" . }}keygen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "datuplet-infra.prefix" . }}keygen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # Secrets — keygen creates pg passwords, openfga api key, signing-key.
  # `patch` covers helm.sh/resource-policy annotation writes.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
  # CNPG Cluster — openfga-dsn-job reuses this SA and needs to read cluster phase.
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "datuplet-infra.prefix" . }}keygen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-infra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ include "datuplet-infra.prefix" . }}keygen
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "datuplet-infra.prefix" . }}keygen

{{- /*
ServiceAccount + ClusterRole + ClusterRoleBinding for pipeline-api.

pipeline-api provisions per-project Namespaces (datuplet-<uuid>) and
mutates PipelineRuns + Secrets across them, so namespace-scoped roles are
not sufficient — ClusterRole + ClusterRoleBinding required.

Verb set covers the actual trigger + cancel call graph:
- Observer no longer runs in this binary — `watch` verbs dropped.
- Pods: cancel path uses `list` + `patch` only.
- Pipelines: only `get`, `create`, `update` from CRD materialization.
- Pipelineruns: `get`, `create`, `delete` for trigger/cancel.
  PLUS `list` retained for the reaper CronJob which currently shares this
  ServiceAccount. The cleaner fix is to give the reaper its own narrower
  SA (see docs/known-gaps.md).
- Namespaces: `get`, `create` for project provisioning; `list` so the
  reaper can enumerate project namespaces (RFC 026 P1.5 — Secret listing
  is now per-namespace, not cluster-wide).
- Secrets: NO cluster-wide verbs (RFC 026 P1.5). pipeline-api manages
  Secrets only within each project namespace via the `datuplet-secrets`
  Role it creates there (EnsureProjectNamespace). Creating that Role +
  its RoleBinding while lacking cluster Secret verbs trips Kubernetes'
  privilege-escalation guard, so the `roles`/`rolebindings` rule below
  carries `escalate` + `bind`.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: pipeline-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-pipeline-api
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
rules:
  # Namespace provisioning — Get-before-Create pattern. `list` lets the
  # reaper enumerate project namespaces to sweep their run Secrets.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create", "list"]
  # Pipeline CRD materialization on trigger (Get + Create, Update on race).
  - apiGroups: ["datuplet.io"]
    resources: ["pipelines"]
    verbs: ["get", "create", "update"]
  # PipelineRun trigger (Create + Get for UID) + cancel (Get + Delete).
  # `list` kept for the reaper CronJob (shares this SA — see header).
  - apiGroups: ["datuplet.io"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "create", "delete"]
  # Per-project-namespace secret RBAC (RFC 026 P1.5). pipeline-api creates
  # the `datuplet-secrets` + `datuplet-secrets-operator` Roles and their
  # RoleBindings inside each project namespace (EnsureProjectNamespace).
  # `escalate` (roles) + `bind` (referenced role) are REQUIRED: without
  # cluster-wide Secret verbs, granting Secret verbs via a new Role/binding
  # would otherwise be blocked by Kubernetes' privilege-escalation guard.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles"]
    verbs: ["get", "create", "escalate", "bind"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "create"]
  # Cancel path: list pods by label selector, patch the
  # datuplet.io/cancel=true annotation.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "patch"]
  # Component registry (RFC 026 P2): GET /api/v1/components catalog
  # handlers + registry-aware pipeline-save validation both List
  # ComponentDefinition CRs via pipeline-api's registry.View. No write
  # verbs — registration/deprecation is CLI-only (`pipeline-api admin
  # component ...`), run out-of-Pod against the operator's own RBAC.
  - apiGroups: ["datuplet.io"]
    resources: ["componentdefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-pipeline-api
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: pipeline-api
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-pipeline-api
  apiGroup: rbac.authorization.k8s.io

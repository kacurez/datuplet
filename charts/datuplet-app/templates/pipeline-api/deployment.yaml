{{- /*
pipeline-api Deployment.

pipeline-api Deployment.

Multi-replica HTTP-only service. The K8s informer runs in pipeline-observer
(1 replica, single-writer to runs DB). Replicas default to 2; can scale
higher via `pipelineApi.replicas`. Migrations run via the chart's pre-install
Job, not at pod boot. Session state lives in Postgres (`sessions` table).
CSRF uses `SameSite=Lax` cookie attribute — no in-memory nonce.

Strategy: RollingUpdate with maxUnavailable=0 — keeps at least N-1 replicas
serving during rollout.

pipeline-api holds NO long-lived S3 credentials. The /ui/storage browser-preview
path reads parquet via lakekeeper-vended STS creds scoped per-request to each
table's S3 prefix. Lakekeeper is the credential authority; pipeline-api is a
vended-creds consumer.

OPENFGA_STORE_NAME + OPENFGA_MODEL_VERSION: pipeline-api calls
authz.ResolveStoreAndModel at startup and fails fast if the FGA store +
version-pin are absent. The authz-bootstrap pre-install hook (weight 20)
ensures the store + pin are written before pipeline-api starts -- no
initContainer needed.
*/ -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datuplet-app.prefix" . }}pipeline-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: pipeline-api
spec:
  replicas: {{ .Values.pipelineApi.replicas | default 2 }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      {{- include "datuplet-app.selectorLabels" (dict "ctx" . "name" "pipeline-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datuplet-app.selectorLabels" (dict "ctx" . "name" "pipeline-api") | nindent 8 }}
    spec:
      # ServiceAccount with ClusterRole for Namespace + Pipeline/PipelineRun
      # CRD + Secret CRUD across project namespaces.
      # SA token is auto-mounted at /var/run/secrets/kubernetes.io/serviceaccount/
      # — pipeline-api reads it for in-cluster K8s API access when
      # PIPELINE_API_IN_CLUSTER=true.
      serviceAccountName: pipeline-api
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # FGA model pin is written by the authz-bootstrap pre-install hook Job
      # (weight 20) before pipeline-api starts. No initContainer needed;
      # pipeline-api fails fast on missing pin via authz.ResolveStoreAndModel.
      containers:
        - name: pipeline-api
          image: "{{ .Values.image.pipelineApi.repository }}:{{ .Values.image.pipelineApi.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--addr", ":8081"]
          ports:
            - { containerPort: 8081, name: http }
          # envFrom carries POSTGRES_HOST, POSTGRES_PORT, POSTGRES_DB, POSTGRES_USER
          # from the CNPG-managed connection Secret (Layer 1 output).
          envFrom:
            - secretRef:
                name: {{ include "datuplet-app.platformPgPipelineApiSecret" . }}
          env:
            - name: PIPELINE_API_ADDR
              value: ":8081"
            # POSTGRES_PASSWORD comes from the per-app password Secret (Layer 1).
            # Injected separately so DATABASE_URL can reference $(POSTGRES_PASSWORD)
            # via K8s dependent-env substitution before the shell ever starts.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datuplet-app.platformPgPipelineApiPwSecret" . }}
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable"
            - name: SIGNING_KEY_FILE
              value: "/var/run/secrets/datuplet-signing-key/signing-key.pem"
            - name: SIGNING_KEY_ID
              value: {{ .Values.pipelineApi.signingKey.keyId | quote }}
            # pipeline-api runs in-cluster with its own ServiceAccount for K8s API
            # access (Namespace + Pipeline CRD + PipelineRun + Secret).
            - name: PIPELINE_API_IN_CLUSTER
              value: "true"
            # Run tokens carry aud=datuplet-catalog.
            # Lakekeeper verifies them via the OIDC discovery doc + JWKS below.
            - name: AUDIENCE
              value: "datuplet-catalog"
            # OIDC discovery doc advertises this URL as `issuer` and points
            # lakekeeper at the JWKS endpoint. Defaults to the in-cluster
            # Service URL when pipelineApi.publicUrl is unset; operators MUST
            # override to the externally reachable URL in production.
            - name: PIPELINE_API_PUBLIC_URL
              value: {{ include "datuplet-app.pipelineApiPublicUrl" . | quote }}
            # Returned to CLI clients in POST /api/v1/auth/token so
            # `datuplet run --remote` can reach lakekeeper directly. Distinct
            # from PIPELINE_API_PUBLIC_URL (which is pipeline-api's own OIDC URL).
            # Empty → field omitted from the auth response (intentional default).
            - name: PIPELINE_API_LAKEKEEPER_PUBLIC_URL
              value: {{ .Values.pipelineApi.lakekeeperPublicUrl | quote }}
            # Serve the browser UI at /ui/* from the bundled static assets.
            - name: PIPELINE_API_UI_DIR
              value: "/app/ui/product"
            # Proxy /api/v1/storage/* through lakekeeper's REST catalog.
            # Pipeline-api holds NO long-lived S3 credentials — parquet reads
            # use lakekeeper-vended STS creds scoped per-request to each
            # table's S3 prefix. Required; absent and the storage handlers
            # degrade to 503.
            #
            # Warehouse name is NOT an env var: pipeline-api resolves it
            # per-request from lakekeeper based on the user's project.
            - name: DATUPLET_LAKEKEEPER_URL
              value: {{ include "datuplet-app.lakekeeperUrl" . | quote }}
            # Client-side query mint policy (RFC 022 §5.3). Default false: the
            # POST /api/v1/query/token endpoint returns a 403 refusal. Set
            # allowClientSideQuery=true to let the laptop-side `datuplet-query`
            # CLI mint short-lived query JWTs. Independent of queryWorker.enabled
            # — the endpoint is always registered when a signing key is present.
            - name: DATUPLET_ALLOW_CLIENT_SIDE_QUERY
              value: {{ .Values.allowClientSideQuery | default false | quote }}
            {{- if .Values.queryWorker.enabled }}
            # ── Query Worker (RFC 022) ──────────────────────────────────────
            # Route POST /api/v1/query to the in-cluster query-worker Service.
            # Soft-degrade: both vars are required for the route to register;
            # pipeline-api logs a warning and leaves the route unregistered
            # (404) when either is absent.
            #
            # DATUPLET_QUERY_WAREHOUSE bootstrap-ordering note:
            #   The project-qualified warehouse ID ("projectID/warehouse_name")
            #   is only known after `pipeline-api admin lakekeeper-bootstrap`
            #   runs. Leave queryWorker.query.warehouse="" until bootstrap is
            #   done, then:
            #     helm upgrade <release> charts/datuplet-app --reuse-values \
            #       --set queryWorker.query.warehouse="<projectID>/datuplet"
            #   pipeline-api soft-degrades to 404 until the value is set.
            - name: DATUPLET_QUERY_WORKER_URL
              value: "http://{{ include "datuplet-app.prefix" . }}query-worker.{{ .Release.Namespace }}.svc.cluster.local:8090"
            - name: DATUPLET_QUERY_WAREHOUSE
              value: {{ .Values.queryWorker.query.warehouse | quote }}
            # Optional proxy-layer overrides (0 = use package default).
            - name: DATUPLET_QUERY_DEFAULT_TIMEOUT_S
              value: {{ .Values.queryWorker.query.defaultTimeoutS | default 60 | quote }}
            - name: DATUPLET_QUERY_MAX_TIMEOUT_S
              value: {{ .Values.queryWorker.query.maxTimeoutS | default 300 | quote }}
            - name: DATUPLET_QUERY_DEFAULT_MAX_ROWS
              value: {{ .Values.queryWorker.query.defaultMaxRows | default 1000 | quote }}
            - name: DATUPLET_QUERY_MAX_MAX_ROWS
              value: {{ .Values.queryWorker.query.maxMaxRows | default 10000 | quote }}
            - name: DATUPLET_QUERY_DEFAULT_MAX_BYTES
              value: {{ mul (.Values.queryWorker.query.defaultMaxBytesMiB | default 1) 1048576 | quote }}
            - name: DATUPLET_QUERY_MAX_MAX_BYTES
              value: {{ mul (.Values.queryWorker.query.maxMaxBytesMiB | default 10) 1048576 | quote }}
            - name: DATUPLET_QUERY_PER_PRINCIPAL_INFLIGHT
              value: {{ .Values.queryWorker.query.perPrincipalInflight | default 2 | quote }}
            {{- end }}
            # Pipeline-policy gateway bounds (RFC 026 §4.4/§4.6). pipeline-api
            # rejects (403) a non-superadmin PUT whose gateway knobs exceed
            # these on the diff-gate. 0/unset = no bound on that knob.
            # int64 before quote: Helm parses large YAML integers as float64,
            # which `quote` would render in scientific notation (e.g.
            # "2.68435456e+08"), breaking strconv.ParseInt in pipeline-api.
            - name: PIPELINE_POLICY_GATEWAY_MAX_CHUNK_SIZE
              value: {{ .Values.pipelinePolicy.gateway.maxChunkSize | int64 | quote }}
            - name: PIPELINE_POLICY_GATEWAY_MAX_BUFFER_SIZE
              value: {{ .Values.pipelinePolicy.gateway.maxBufferSize | int64 | quote }}
            - name: PIPELINE_POLICY_GATEWAY_MAX_TARGET_FILE_SIZE
              value: {{ .Values.pipelinePolicy.gateway.maxTargetFileSize | int64 | quote }}
            # Fine-grained authz via OpenFGA.
            - name: OPENFGA_URL
              value: {{ include "datuplet-app.openfgaHttpUrl" . | quote }}
            # The keygen Job writes this Secret. pipeline-api reads the API key
            # to authenticate against OpenFGA.
            - name: OPENFGA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "datuplet-app.platformOpenfgaApiKeySecret" . }}
                  key: keys
            # pipeline-api self-discovers store_id + model_id at startup via
            # authz.ResolveStoreAndModel (pin-tuple lookup). The authz-bootstrap
            # pre-install hook (weight 20) guarantees both the store and pin
            # tuple exist before pipeline-api starts.
            - name: OPENFGA_STORE_NAME
              value: {{ .Values.platform.openfgaStoreName | default "datuplet" | quote }}
            - name: OPENFGA_MODEL_VERSION
              value: {{ .Values.fgaModel.version | quote }}
          volumeMounts:
            - name: signing-key
              mountPath: /var/run/secrets/datuplet-signing-key
              readOnly: true
          resources:
            {{- toYaml .Values.pipelineApi.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: signing-key
          secret:
            secretName: {{ include "datuplet-app.platformSigningKeySecret" . }}

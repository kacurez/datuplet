{{- /*
pipeline-operator Deployment.

This is the only operator. The PipelineRun controller builds one component
Job per stage component; the Data Gateway sidecar commits Iceberg tables
inline (RFC 021), so there are no separate commit Jobs.

Long-lived S3/GCS credentials are NOT forwarded to the operator or to the
spawned component Pods. The DG sidecar uses only the run-token JWT; lakekeeper
vends per-table STS credentials for all data-plane access.

The operator no longer carries warehouse/project knowledge. The PipelineAPIURL
drives the JWKS endpoint DG sidecars use to validate the mounted run-token
JWT, which carries warehouse + project_id claims.

Note: automountServiceAccountToken left at default (true) — operator needs K8s
API access.
*/ -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: pipeline-operator
spec:
  replicas: {{ .Values.pipelineOperator.replicas }}
  selector:
    matchLabels:
      {{- include "datuplet-app.selectorLabels" (dict "ctx" . "name" "pipeline-operator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "datuplet-app.selectorLabels" (dict "ctx" . "name" "pipeline-operator") | nindent 8 }}
    spec:
      serviceAccountName: pipeline-operator
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.image.pipelineOperator.repository }}:{{ .Values.image.pipelineOperator.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # LAKEKEEPER_URL is forwarded to spawned commit containers for
            # metadata commits.
            - name: LAKEKEEPER_URL
              value: {{ include "datuplet-app.lakekeeperUrl" . | quote }}
            # Base URL of pipeline-api. The operator derives the JWKS URL
            # ({PIPELINE_API_URL}/api/v1/auth/jwks.json) and injects it into every
            # DG sidecar configMap so it can validate the mounted run-token
            # JWT against pipeline-api's published keys.
            - name: PIPELINE_API_URL
              value: {{ include "datuplet-app.pipelineApiInClusterUrl" . | quote }}
            # Image tag for the gateway sidecar the operator injects into
            # component Pods. Plumbed from chart values so release artifacts
            # pin versioned tags while local dev defaults to :latest.
            - name: GATEWAY_IMAGE
              value: "{{ .Values.image.gateway.repository }}:{{ .Values.image.gateway.tag }}"
            # Runtime pull policy applied by the operator to per-run
            # pods (gateway sidecar, component container).
            # Mirrors image.pullPolicy so a single helm value drives
            # both chart-managed Deployments and operator-spawned pods.
            # Empty = operator default (Always).
            - name: DATUPLET_RUNTIME_PULL_POLICY
              value: {{ .Values.image.pullPolicy | quote }}
            {{- with .Values.runtimeDefaults.tolerations }}
            - name: DATUPLET_RUN_TOLERATIONS_JSON
              value: {{ . | toJson | quote }}
            {{- end }}
            # Per-PipelineRun gateway-sidecar instrumentation toggles.
            # See values.yaml::pipelineOperator.gatewayInstrumentation.
            {{- if .Values.pipelineOperator.gatewayInstrumentation.debug }}
            - name: DATUPLET_GATEWAY_DEBUG
              value: "true"
            {{- end }}
            {{- if .Values.pipelineOperator.gatewayInstrumentation.profiling.enabled }}
            - name: DATUPLET_GATEWAY_PROFILING
              value: "true"
            - name: DATUPLET_GATEWAY_PROFILING_SERVER_ADDRESS
              value: {{ .Values.pipelineOperator.gatewayInstrumentation.profiling.serverAddress | quote }}
            {{- with .Values.pipelineOperator.gatewayInstrumentation.profiling.auth }}
            {{- if .existingSecret }}
            - name: PYROSCOPE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | quote }}
                  key: PYROSCOPE_USERNAME
            - name: PYROSCOPE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | quote }}
                  key: PYROSCOPE_PASSWORD
            {{- else }}
            {{- with .username }}
            - name: PYROSCOPE_USERNAME
              value: {{ . | quote }}
            {{- end }}
            {{- with .password }}
            - name: PYROSCOPE_PASSWORD
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.pipelineOperator.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

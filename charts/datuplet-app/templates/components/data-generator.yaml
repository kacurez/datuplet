{{- if .Values.components.builtins }}
{{- /*
ComponentDefinition CR for the built-in data-generator component (RFC 026
Task R10). ComponentDefinition is cluster-scoped and shared across all
pipelines (see pkg/k8s/api/v1/component_types.go) — metadata.name is the
literal component-reference string pipelines use, so it is NOT prefixed
with the release namespace the way this chart's ClusterRoles are.

configSchema derived from docs/components.md ("data-generator" section) and
components/data-generator/config.go (Table/RandomSpec/LiteralSpec/Limit).
*/ -}}
---
apiVersion: datuplet.io/v1
kind: ComponentDefinition
metadata:
  name: data-generator
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: data-generator
spec:
  displayName: Data Generator
  description: Generates random or literal rows inline from pipeline YAML — useful for testing pipelines without an external data source.
  maintainer: datuplet
  defaultVersion: {{ .Values.components.tag }}
  versions:
    - version: {{ .Values.components.tag }}
      image: "{{ .Values.components.registry }}/data-generator:{{ .Values.components.tag }}"
      configSchema: |
        {
          "$schema": "https://json-schema.org/draft/2020-12/schema",
          "type": "object",
          "additionalProperties": false,
          "required": [
            "tables"
          ],
          "properties": {
            "tables": {
              "type": "array",
              "minItems": 1,
              "items": {
                "type": "object",
                "additionalProperties": false,
                "required": [
                  "name"
                ],
                "properties": {
                  "name": {
                    "type": "string"
                  },
                  "rowInsertSpeed": {
                    "type": "integer"
                  },
                  "random": {
                    "type": "object",
                    "additionalProperties": false,
                    "properties": {
                      "schema": {
                        "type": "object",
                        "additionalProperties": {
                          "type": "string",
                          "enum": [
                            "string",
                            "int",
                            "long",
                            "float",
                            "double",
                            "boolean",
                            "date",
                            "timestamp",
                            "now",
                            "uuid"
                          ]
                        }
                      },
                      "limit": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "rowsCount": {
                            "type": "integer",
                            "minimum": 0
                          },
                          "sizeInBytes": {
                            "type": "integer",
                            "minimum": 0
                          },
                          "timeoutInSeconds": {
                            "type": "integer",
                            "minimum": 0
                          }
                        }
                      },
                      "userErrorMessage": {
                        "type": "string"
                      }
                    }
                  },
                  "literal": {
                    "type": "object",
                    "additionalProperties": false,
                    "properties": {
                      "columns": {
                        "type": "array",
                        "items": {
                          "type": "string"
                        }
                      },
                      "rows": {
                        "type": "array",
                        "items": {
                          "type": "array"
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      resources:
        default:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        max:
          cpu: "2"
          memory: 2Gi
          ephemeral-storage: 10Gi
{{- end }}

{{- if and .Values.components.builtins .Values.components.enablePandasTransform }}
{{- /*
ComponentDefinition CR for the built-in pandas-transform component (RFC 026
Task R10). See data-generator.yaml in this directory for the cluster-scoped
naming rationale.

Gated behind components.enablePandasTransform (default false, RFC 024 T6.3):
no image is published for this component yet (absent from
_release-components.yml and docker-build-k8s), so a stock install must not
register a ComponentDefinition that can never be pulled.

configSchema derived from components/pandas-transform/main.py (the actual
source, not docs/components.md, per the task brief — the two agree):
  - output_table: optional string (comp_config.get("output_table", ...)).
  - operations: array of op objects, each requiring "type" (dispatched in
    apply_operation: filter/select/sort/rename/drop/fillna).
    - filter: column, op (enum of the 8 comparison operators handled in
      apply_filter), value (untyped — compared against arbitrary column
      values, so left schema-free).
    - select/drop: columns (apply_select always takes a list; apply_drop
      accepts a bare string or a list — modeled as a oneOf).
    - sort: by (apply_sort accepts a bare string or a list) + ascending.
    - rename: columns (apply_rename takes a dict of old->new names).
    - fillna: column (optional — omitted fills every column) + value.
*/ -}}
---
apiVersion: datuplet.io/v1
kind: ComponentDefinition
metadata:
  name: pandas-transform
  labels:
    {{- include "datuplet-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: pandas-transform
spec:
  displayName: Pandas Transform
  description: Applies a sequence of pandas operations (filter, select, sort, rename, drop, fillna) to input data.
  maintainer: datuplet
  io:
    inputs: required
    outputs: required
  defaultVersion: {{ .Values.components.tag }}
  versions:
    - version: {{ .Values.components.tag }}
      image: "{{ .Values.components.registry }}/pandas-transform:{{ .Values.components.tag }}"
      configSchema: |
{{ .Files.Get (printf "files/component-schemas/%s.json" "pandas-transform") | indent 8 }}
      resources:
        default:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        max:
          cpu: "2"
          memory: 2Gi
          ephemeral-storage: 10Gi
{{- end }}

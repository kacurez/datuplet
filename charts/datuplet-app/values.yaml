# charts/datuplet-app/values.yaml

# Chart-global tolerations applied to EVERY pod-spec template in this
# chart (pipeline-api, pipeline-observer, pipeline-operator, reaper
# CronJob, authz-bootstrap Job, pipeline-api-migrate Job, wait-for-platform
# Job). Pass-through to each pod's spec.tolerations.
#
# Example (ARM node pool with kubernetes.io/arch=arm64:NoSchedule taint):
#   --set-json 'tolerations=[{"key":"kubernetes.io/arch","operator":"Equal","value":"arm64","effect":"NoSchedule"}]'
tolerations: []

# Tolerations applied to per-run Pods spawned by the pipeline-operator
# (PipelineRun component Pods + TableCommit Job Pods). Empty default
# means no tolerations are injected (pass-through to spec.tolerations on each Pod).
#
# Example for an all-ARM GKE node pool:
#   --set-json 'runtimeDefaults.tolerations=[{"key":"kubernetes.io/arch","operator":"Equal","value":"arm64","effect":"NoSchedule"}]'
runtimeDefaults:
  tolerations: []

image:
  pullPolicy: Always
  pullSecrets: []
  pipelineApi:
    repository: datuplet/pipeline-api
    tag: latest
  pipelineOperator:
    repository: datuplet/pipeline-operator
    tag: latest
  # pipeline-observer is the single-writer to the runs DB.
  pipelineObserver:
    repository: datuplet/pipeline-observer
    tag: latest
  # Data Gateway sidecar image — pipeline-operator passes this to every
  # component Pod's gateway sidecar via the GATEWAY_IMAGE env var.
  gateway:
    repository: datuplet/gateway
    tag: latest
  # iceberg-job image — pipeline-operator passes this to every spawned
  # TableCommit Job via the ICEBERG_JOB_IMAGE env var.
  icebergJob:
    repository: datuplet/iceberg-job
    tag: latest

# FGA model version. Bump when files/fga/** changes.
# See docs/fga-model-upgrades.md for the upgrade procedure.
# The model IS Datuplet's schema, so its version belongs in the app release chart.
fgaModel:
  version: "4.4"

# datuplet-infra coordinates.
# These MUST match the values.yaml fields of the infra install.
platform:
  # Cross-chart Secret names are bare (no release prefix) — datuplet-infra
  # dropped its release prefix so names like signing-key, pg-pipeline-api, etc.
  # are stable across installs.
  openfgaStoreName: datuplet

# Pipeline-api service config
pipelineApi:
  # HTTP-only (observer handles K8s informer). 2 replicas default; raise for
  # higher request concurrency. Migrations are owned by the pre-install Job,
  # not pod boot; safe at N replicas.
  replicas: 2
  service:
    type: NodePort
    nodePort: 30081
  # Advertised as `issuer` in the OIDC discovery doc; lakekeeper polls it
  # to fetch the JWKS. Must be reachable by lakekeeper. Defaults to the
  # in-cluster Service URL; operators MUST override this to the externally
  # reachable URL in production so lakekeeper can validate run-token JWTs
  # presented by client components.
  publicUrl: ""
  # Returned to CLI clients in POST /api/v1/auth/token so `datuplet run
  # --remote` can reach lakekeeper directly. Distinct from publicUrl —
  # that's pipeline-api's own URL for lakekeeper OIDC discovery.
  # Empty disables the field in the auth response (intentional default so a
  # production install without an explicit override does not silently ship a
  # dev-only URL to CLI clients).
  lakekeeperPublicUrl: ""
  signingKey:
    # keyId is embedded in JWT header `kid` — must match the key in signing-key.pem.
    keyId: key-1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  initAdmin:
    enabled: true
    email: admin@datuplet.local
    password: ""           # auto-generated by keygen if empty

# Warehouse storage configuration — pipeline-api proxies lakekeeper catalog;
# S3/GCS credentials are held exclusively by lakekeeper.
# Pipeline-api reads parquet via lakekeeper-vended STS creds (per-request,
# never stored). Non-secret values below are used for lakekeeper-bootstrap
# CLI flags (`pipeline-api admin lakekeeper-bootstrap`) and UI display only.
warehouse:
  name: datuplet
  # lakekeeper in-cluster URL (catalog endpoint). Defaults to the platform
  # subchart's fixed fullnameOverride=lakekeeper service DNS.
  lakekeeperUrl: ""   # rendered via helper; override to use external lakekeeper
  type: s3            # s3 | gcs — informational only; pipeline-api no longer
                      # reads DATUPLET_STORAGE_TYPE from env
  s3:
    bucket: datuplet
    endpoint: ""             # empty → use bundled minio; set for external S3
    region: us-east-1
    pathStyleAccess: "true"
    # accessKey, secretKey, existingSecret are NOT here — S3 credentials are
    # passed as flags to `pipeline-api admin lakekeeper-bootstrap` and stored
    # in lakekeeper's own database. Never env-mounted on pipeline-api.
  gcs:
    bucket: ""
    # existingSecret is NOT here — GCS credentials flow via lakekeeper-bootstrap
    # flags, not a pipeline-api volume mount.

# Pipeline-policy bounds (RFC 026 §4.6). pipeline-api enforces these on the
# PUT /api/v1/projects/{pid}/pipelines/{name} diff-gate (§4.4): a non-superadmin
# whose gateway knobs exceed a bound gets a 403. A zero/unset value means "no
# bound on that knob". Resource ceilings are NOT here — they are registry-driven
# (per-ComponentDefinition Max, clamped by the controller).
pipelinePolicy:
  gateway:                    # non-superadmins must stay within these
    maxChunkSize: 268435456       # 256Mi
    maxBufferSize: 536870912      # 512Mi
    maxTargetFileSize: 1073741824 # 1Gi

pipelineOperator:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

  # Gateway-sidecar instrumentation. Injected by the operator into every
  # gateway sidecar it spawns. Off by default.
  gatewayInstrumentation:
    # Verbose DBG logs: per-chunk, per-flush, per-rotation, upload timing.
    debug: false

    # Pyroscope continuous profiling (CPU + heap + goroutines).
    profiling:
      enabled: false
      # Grafana Cloud Profiles endpoint, or in-cluster Pyroscope URL.
      serverAddress: ""
      # Basic Auth — pick ONE. existingSecret wins when both set.
      # existingSecret references a Secret in this release's namespace
      # with PYROSCOPE_USERNAME / PYROSCOPE_PASSWORD keys.
      # Both empty = unauthenticated Pyroscope only.
      auth:
        username: ""
        password: ""
        existingSecret: ""

# Pipeline-observer runs at exactly 1 replica (single-writer to the runs
# table; no leader election). Failure mode = run-status DB lag, surfaced
# via pipelineapi_observer_lag_seconds metric.
pipelineObserver:
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ─── Query Worker (RFC 022) ───────────────────────────────────────────────────
#
# Ad-hoc SQL query service backed by an embedded DuckDB engine that attaches to
# the lakekeeper Iceberg catalog. The query-worker is an EXPERIMENTAL feature
# and is disabled by default. Set queryWorker.enabled=true to opt in.
#
# The warehouse is resolved per request from the project-scoped route
# (POST /api/v1/projects/{pid}/query, RFC 025) — no post-install warehouse
# step is needed. Multi-warehouse support is deferred.
#
# No autoscaling block: DuckDB's in-process concurrency knob (queryWorker.concurrency)
# is the primary throughput lever for v1. HPA / KEDA integration is deferred.
queryWorker:
  # enabled: false → no Deployment, Service, or NetworkPolicy resources are
  # rendered; pipeline-api also skips the DATUPLET_QUERY_WORKER_URL env var.
  enabled: false

  # replicas: number of query-worker Deployment replicas. Each replica runs
  # its own embedded DuckDB at full concurrency. Keep at 1 for v1 (single
  # DuckDB instance; scale via concurrency knob inside the pod).
  replicas: 1

  image:
    # repository: image repository for the query-worker binary.
    repository: datuplet/query-worker
    # tag: image tag. Defaults to :latest (matches all other chart images).
    tag: latest
    # pullPolicy: overrides the chart-global image.pullPolicy for the
    # query-worker only. Leave empty ("") to inherit the global setting.
    pullPolicy: ""

  # resources: Guaranteed QoS — requests == limits (required by DuckDB memory
  # accounting: the engine trusts SET memory_limit to stay within the cgroup).
  # ephemeral-storage matches scratch.sizeLimit so the Pod is not evicted
  # before DuckDB hits its own MaxTempSize cap.
  resources:
    requests:
      # memory: must match limits. Helm template arithmetic derives
      # DATUPLET_QUERY_WORKER_MEMORY_LIMIT from this value minus headroom.
      #   formula: floor((memLimitBytes * (100 - memoryHeadroomPct) / 100) / concurrency)
      #   example: 2Gi, 25% headroom, concurrency 2
      #            → 2048 * 75% / 2 = 768 MiB per DuckDB slot.
      memory: 2Gi
      cpu: 500m
      ephemeral-storage: 2Gi
    limits:
      memory: 2Gi
      cpu: 2
      ephemeral-storage: 2Gi

  # concurrency: number of simultaneous query slots (semaphore size). Each
  # slot runs one DuckDB query. Memory per slot = derived from memory_limit
  # formula above. Matches DATUPLET_QUERY_WORKER_CONCURRENCY.
  concurrency: 2

  # memoryHeadroomPct: percentage of the container memory limit reserved for
  # Go runtime overhead (HTTP server, JWKS cache, etc.) before dividing the
  # remainder among DuckDB slots. Valid range: 0–90.
  # memory_limit = floor(memLimitBytes * (100 - memoryHeadroomPct) / 100 / concurrency)
  memoryHeadroomPct: 25

  # scratch: emptyDir volume mounted at /scratch for DuckDB spill-to-disk.
  scratch:
    # sizeLimit: total emptyDir size. Shared across all concurrency slots.
    # max_temp_directory_size per slot = sizeLimit / concurrency (helm math).
    sizeLimit: 2Gi

  # query: controls forwarded to pipeline-api's queryproxy layer.
  query:
    # defaultTimeoutS: default query timeout in seconds when the client
    # does not specify one. Must be ≤ maxTimeoutS.
    defaultTimeoutS: 60
    # maxTimeoutS: hard ceiling on per-query timeout the client may request.
    maxTimeoutS: 300
    # defaultMaxRows: default row limit returned per query.
    defaultMaxRows: 1000
    # maxMaxRows: hard ceiling on rows the client may request.
    maxMaxRows: 10000
    # defaultMaxBytesMiB: default result-set size limit in MiB (1 MiB).
    defaultMaxBytesMiB: 1
    # maxMaxBytesMiB: hard ceiling on result bytes the client may request (10 MiB).
    maxMaxBytesMiB: 10
    # perPrincipalInflight: max concurrent in-flight requests per authenticated
    # principal (pipeline-api proxy layer). Prevents a single user from
    # exhausting the worker's semaphore.
    perPrincipalInflight: 2

# allowClientSideQuery gates the POST /api/v1/query/token mint endpoint (RFC 022
# §5.3): the per-invocation query-JWT mint the laptop-side `datuplet-query` CLI
# calls to run ad-hoc SQL locally (BYO-local, mode c). DEFAULT FALSE — an
# explicit operator opt-in. When false, pipeline-api returns a 403 refusal
# (never a 404): the gate is server-enforced, so an old/rogue CLI cannot bypass
# it. Setting true mints short-lived catalog JWTs to laptops, which then read
# warehouse data directly via lakekeeper-vended STS creds — enable only when
# that egress posture is acceptable. Independent of queryWorker.enabled (which
# controls the server-side POST /api/v1/projects/{pid}/query path).
allowClientSideQuery: false

# Built-in ComponentDefinition catalog (RFC 026 Task R10). Each component's
# image ref is "<components.registry>/<component-name>:<components.tag>",
# rendered by charts/datuplet-app/templates/components/*.yaml.
components:
  # builtins: install the six built-in ComponentDefinition CRs shipped by
  # this chart. Disable in environments that register their own definitions
  # out-of-band (the K8s e2e harness registers locally-built ":latest"
  # images via tests/e2e/framework/components_bootstrap.go, so it sets this
  # false to avoid two owners of the same cluster-scoped object).
  builtins: true
  registry: ghcr.io/kacurez
  # tag: a stable vMAJOR.MINOR.PATCH version — never "latest" (the
  # ComponentDefinition CRD's CEL rule and the R8 registration-time
  # reconciler both reject a stable version pinned to a ":latest" image).
  # Chart.yaml's appVersion ("1.0") is not vX.Y.Z-shaped, so this is pinned
  # explicitly instead of deriving from appVersion; it matches the image tag
  # documented for all six built-in components in docs/components.md.
  tag: v0.1.0

bootstrap:
  externalImages:
    # bitnami/kubectl:1.31 retired when Bitnami restructured the registry —
    # only :latest and bitnamilegacy/kubectl:X.Y remain. See platform values.
    kubectl: "bitnami/kubectl:latest"
    # openfga/cli used by authz-bootstrap model-write initContainer.
    openfgaCli: "openfga/cli:v0.6.2"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

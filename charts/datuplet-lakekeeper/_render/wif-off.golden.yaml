# Source: datuplet-lakekeeper/templates/config-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-config
  namespace: default
  labels:
    helm.sh/chart: datuplet-lakekeeper-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/part-of: datuplet
    app.kubernetes.io/component: lakekeeper-config
type: Opaque
stringData:
  # OpenFGA backend (datuplet-infra service, same namespace).
  LAKEKEEPER__OPENFGA__ENDPOINT: "http://openfga.default.svc.cluster.local:8081"
  LAKEKEEPER__OPENFGA__STORE_NAME: "datuplet"
  # OIDC auth: lakekeeper validates Bearer JWTs against pipeline-api's JWKS
  # (published at /.well-known/openid-configuration → jwks_uri). Without
  # OPENID_PROVIDER_URI lakekeeper has no JWKS and treats every token as
  # anonymous — which fails the bootstrap endpoint and any authz check.
  # ADDITIONAL_ISSUERS accepts pipeline-api's iss claim ("datuplet-api" —
  # a plain string, not a URL). AUDIENCE pins lakekeeper to only accept
  # tokens minted for it.
  LAKEKEEPER__OPENID_PROVIDER_URI: "http://pipeline-api.default.svc.cluster.local:8081"
  LAKEKEEPER__OPENID_ADDITIONAL_ISSUERS: "datuplet-api"
  LAKEKEEPER__OPENID_AUDIENCE: "datuplet-catalog"
  # Tells lakekeeper to use OUR pinned model (model_version:collaboration-X)
  # written by datuplet-app's authz-bootstrap instead of its compiled-in default
  # (4.3 for lakekeeper 0.12.0). Without this lakekeeper fails at startup
  # with "Active authorization model with version 4.3 not found in OpenFGA."
  # because we pin our merged Datuplet+lakekeeper DSL as version
  # 4.4.
  # Also tells lakekeeper to skip its own FGA migration.
  LAKEKEEPER__OPENFGA__CONFIGURED_MODEL_VERSION: "4.4"
---

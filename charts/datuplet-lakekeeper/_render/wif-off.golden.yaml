# Source: datuplet-lakekeeper/templates/bootstrap/wait-for-fga-pin-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-fga-pin
  namespace: default
  labels:
    helm.sh/chart: datuplet-lakekeeper-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/part-of: datuplet
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-fga-pin
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/part-of: datuplet
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: datuplet-lakekeeper-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: check
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              FGA_HTTP="http://openfga.$POD_NAMESPACE.svc.cluster.local:8080"
              VERSION="$FGA_MODEL_VERSION"

              for i in $(seq 1 60); do
                # Poll for the datuplet store
                STORES=$(curl -fsS -H "Authorization: Bearer $OPENFGA_API_KEY" \
                  "$FGA_HTTP/stores" 2>/dev/null || echo "")
                STORE_ID=""
                if echo "$STORES" | grep -q '"name":"datuplet"'; then
                  STORE_ID=$(echo "$STORES" \
                    | sed -nE 's/.*"id":"([^"]+)"[^}]*"name":"datuplet".*/\1/p; s/.*"name":"datuplet"[^}]*"id":"([^"]+)".*/\1/p' \
                    | head -n1)
                fi
                if [ -n "$STORE_ID" ]; then
                  # Poll for the pin tuple (relation=openfga_id, object=model_version:collaboration-<VERSION>)
                  PIN=$(curl -fsS -H "Authorization: Bearer $OPENFGA_API_KEY" \
                    -X POST "$FGA_HTTP/stores/$STORE_ID/read" \
                    -H "Content-Type: application/json" \
                    -d "{\"tuple_key\":{\"relation\":\"openfga_id\",\"object\":\"model_version:collaboration-$VERSION\"}}" 2>/dev/null || echo "")
                  if echo "$PIN" | grep -q 'auth_model_id:'; then
                    echo "FGA model pin ready for version $VERSION (store=$STORE_ID)"
                    exit 0
                  fi
                fi
                echo "Waiting for FGA model pin (version $VERSION)... ($i/60)"
                sleep 5
              done

              echo "" >&2
              echo "Timed out waiting for FGA model pin (version $VERSION)." >&2
              echo "Did datuplet-app finish installing? authz-bootstrap writes the pin tuple" >&2
              echo "on Phase 3 (datuplet-app) install. Run:" >&2
              echo "  helm upgrade --install datuplet-app charts/datuplet-app -n $POD_NAMESPACE --wait --wait-for-jobs" >&2
              echo "before installing datuplet-lakekeeper." >&2
              exit 1
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPENFGA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openfga-api-key
                  key: keys
            # Inlined from .Values.platform.fgaModelVersion — non-secret version
            # number. Cannot use a secretKeyRef on lakekeeper-config because that
            # Secret is a main-chart resource that doesn't exist when pre-install
            # hooks run.

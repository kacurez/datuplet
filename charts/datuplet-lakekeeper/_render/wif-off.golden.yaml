# Source: datuplet-lakekeeper/charts/lakekeeper/templates/catalog/catalog-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakekeeper
  namespace: default
  labels:
    helm.sh/chart: lakekeeper-0.10.0
    app.kubernetes.io/name: lakekeeper
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.12.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: lakekeeper
    app.kubernetes.io/component: catalog
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: lakekeeper
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: catalog
  template:
    metadata:
      annotations:
        checksum/secret-config-envs: 6c834eb1422e72bc5a4f99af25e058231769b409aa4e25da287f1e01246364d1
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
      labels:
        helm.sh/chart: lakekeeper-0.10.0
        app.kubernetes.io/name: lakekeeper
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.12.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: lakekeeper
        app.kubernetes.io/component: catalog
        app.kubernetes.io/name: lakekeeper
        app.kubernetes.io/part-of: datuplet
    spec:
      restartPolicy: Always
      serviceAccountName: lakekeeper
      initContainers:
        - args:
          - |
            set -eu
            FGA_HTTP="http://openfga.$POD_NAMESPACE.svc.cluster.local:8080"
            # VERSION sourced from the parent-rendered lakekeeper-config Secret
            # (LAKEKEEPER__OPENFGA__CONFIGURED_MODEL_VERSION) via secretKeyRef
            # on the env block below. Single source of truth =
            # .Values.platform.fgaModelVersion — no hardcoded version drift.
            VERSION="$FGA_MODEL_VERSION"
            for i in $(seq 1 60); do
              # openfga returns stores as {"stores":[{"id":"...","name":"datuplet",...}]}.
              # Field order in the response varies — match either id-first or name-first.
              STORES=$(curl -fsS -H "Authorization: Bearer $OPENFGA_API_KEY" \
                "$FGA_HTTP/stores" 2>/dev/null || echo "")
              STORE_ID=""
              if echo "$STORES" | grep -q '"name":"datuplet"'; then
                STORE_ID=$(echo "$STORES" \
                  | sed -nE 's/.*"id":"([^"]+)"[^}]*"name":"datuplet".*/\1/p; s/.*"name":"datuplet"[^}]*"id":"([^"]+)".*/\1/p' \
                  | head -n1)
              fi
              if [ -n "$STORE_ID" ]; then
                PIN=$(curl -fsS -H "Authorization: Bearer $OPENFGA_API_KEY" \
                  -X POST "$FGA_HTTP/stores/$STORE_ID/read" \
                  -H "Content-Type: application/json" \
                  -d "{\"tuple_key\":{\"relation\":\"openfga_id\",\"object\":\"model_version:collaboration-$VERSION\"}}" 2>/dev/null)
                if echo "$PIN" | grep -q 'auth_model_id:'; then
                  echo "FGA store + pin ready for version $VERSION (store=$STORE_ID)"
                  exit 0
                fi
              fi
              echo "Waiting for FGA store + pin... ($i/60)"
              sleep 5
            done
            echo "Timed out waiting for FGA store + pin" >&2
            exit 1
          command:
          - sh
          - -c
          env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: OPENFGA_API_KEY
            valueFrom:
              secretKeyRef:
                key: keys
                name: openfga-api-key
          - name: FGA_MODEL_VERSION
            valueFrom:
              secretKeyRef:
                key: LAKEKEEPER__OPENFGA__CONFIGURED_MODEL_VERSION
                name: lakekeeper-config
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          name: wait-for-fga-store
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
        - args:
          - |
            set -eu
            # OIDC discovery URL must match LAKEKEEPER__OPENID_PROVIDER_URI in
            # templates/config-secret.yaml. Pipeline-api serves both
            # the discovery doc AND the JWKS — probe the discovery endpoint,
            # which proves the JWKS is also reachable.
            URL="http://pipeline-api.$POD_NAMESPACE.svc.cluster.local:8081/.well-known/openid-configuration"
            for i in $(seq 1 120); do
              if curl -fsS "$URL" >/dev/null 2>&1; then
                echo "pipeline-api OIDC discovery reachable at $URL"
                exit 0
              fi
              echo "Waiting for pipeline-api OIDC... ($i/120)"
              sleep 2
            done
            echo "Timed out waiting for pipeline-api OIDC discovery" >&2
            exit 1
          command:
          - sh
          - -c
          env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          name: wait-for-pipeline-api
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault        
        
        - name: check-db  
          image: quay.io/lakekeeper/catalog:v0.12.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65532
            runAsGroup: 65534
          resources:
            {}
          envFrom:    
            - secretRef:
                name: lakekeeper-config-envs
            - secretRef:
                name: pg-lakekeeper
            - secretRef:
                name: lakekeeper-config
          env:    
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: golden-render
                  key: encryptionKey
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: pg-lakekeeper-pw
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: LAKEKEEPER__OPENFGA__API_KEY
              valueFrom:
                secretKeyRef:
                  key: keys
                  name: openfga-api-key
            
            - name: LAKEKEEPER__PLACEHOLDER
              value: "placeholder"
          args:
            - wait-for-db
            - -dm
            - -r
            - "100"
            - -b
            - "2"
      containers:
        - name: lakekeeper          
          image: quay.io/lakekeeper/catalog:v0.12.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65532
            runAsGroup: 65534
          env:            
            - name: LAKEKEEPER__PG_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: golden-render
                  key: encryptionKey
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: pg-lakekeeper-pw
            - name: LAKEKEEPER__PG_DATABASE_URL_READ
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: LAKEKEEPER__PG_DATABASE_URL_WRITE
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: LAKEKEEPER__OPENFGA__API_KEY
              valueFrom:
                secretKeyRef:
                  key: keys
                  name: openfga-api-key
            
            - name: LAKEKEEPER__PLACEHOLDER
              value: "placeholder"
          envFrom:            
            - secretRef:
                name: lakekeeper-config-envs
            - secretRef:
                name: pg-lakekeeper
            - secretRef:
                name: lakekeeper-config
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
            - name: metrics
              containerPort: 9000
              protocol: TCP
          args:
            - serve
          livenessProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 5
            httpGet:
              path: /health
              port: 8181
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 5
            httpGet:
              path: /health
              port: 8181
          resources:
            {}

# Source: datuplet-lakekeeper/charts/lakekeeper/templates/tests/bootstrap.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "lakekeeper-test-bootstrap"
  namespace: default
  labels:
    helm.sh/chart: lakekeeper-0.10.0
    app.kubernetes.io/name: lakekeeper
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.12.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: lakekeeper
    component: catalog
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: lakekeeper
  containers:
    - name: base
      image: curlimages/curl:latest
      command: ['sh', "-c"]
      args:
        - |
          set -e
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          BOOTSTRAP_URL="http://lakekeeper:8181/management/v1/bootstrap"
          if [ -n "$TOKEN" ]; then
            echo "Found K8s Service Account token"
          else
            echo "No K8s Service Account token found"
          fi
          for i in {1..45}; do
            RESPONSE=$(curl --location "$BOOTSTRAP_URL" \
              --header 'Content-Type: application/json' \
              --header "Authorization: Bearer $TOKEN" \
              --data '{"accept-terms-of-use": true}' \
              --write-out "HTTP_CODE:%{http_code}" --silent --output /dev/null)

            if [[ "$RESPONSE" == *"HTTP_CODE:204"* ]]; then
              echo "Bootstrapping successful"
              exit 0
            else
              echo "Request failed with status code and response: $RESPONSE"
            fi

            sleep 2
          done
          echo "Failed to bootstrap within the given time"
          exit 1
  restartPolicy: Never

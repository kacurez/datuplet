{{- /*
Parent-owned ServiceAccount for lakekeeper.

The subchart's own ServiceAccount creation is disabled
(lakekeeper.serviceAccount.create=false in values.yaml) so the parent
chart can conditionally inject the Workload Identity annotation without
patching the subchart tarball.

When workloadIdentity.enabled=true the SA receives the
iam.gke.io/gcp-service-account annotation that the GKE metadata server
requires to let the pod impersonate the bound GSA.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lakekeeper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-lakekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakekeeper
  {{- if .Values.workloadIdentity.enabled }}
  {{- if eq .Values.workloadIdentity.gcpServiceAccount "" }}
  {{- fail "workloadIdentity.enabled=true requires workloadIdentity.gcpServiceAccount to be set" }}
  {{- end }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.workloadIdentity.gcpServiceAccount }}
  {{- end }}
automountServiceAccountToken: false

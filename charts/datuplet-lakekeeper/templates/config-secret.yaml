{{- /*
Lakekeeper OpenFGA + OIDC config Secret (parent-rendered).

Pipeline-api and lakekeeper are in separate releases; lakekeeper is gated on
pipeline-api via the wait-for-pipeline-api initContainer in values.yaml.

Subchart values can't expand parent-chart template variables like
`{{ .Release.Namespace }}`. So we render the LAKEKEEPER__OPENFGA__* +
LAKEKEEPER__OPENID_* envs that need namespace templating here and mount
this Secret into the lakekeeper catalog container via
`lakekeeper.catalog.extraEnvFrom`.

CONFIGURED_MODEL_VERSION pins lakekeeper to the model version uploaded by
authz-bootstrap (matches our DSL hash sentinel). Bumping
platform.fgaModelVersion on helm upgrade re-pins lakekeeper too.
Must match charts/datuplet-app/values.yaml :: fgaModel.version.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datuplet-lakekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakekeeper-config
type: Opaque
stringData:
  # OpenFGA backend (datuplet-infra service, same namespace).
  LAKEKEEPER__OPENFGA__ENDPOINT: "http://openfga.{{ .Release.Namespace }}.svc.cluster.local:8081"
  LAKEKEEPER__OPENFGA__STORE_NAME: {{ .Values.platform.openfgaStoreName | quote }}
  # OIDC auth: lakekeeper validates Bearer JWTs against pipeline-api's JWKS
  # (published at /.well-known/openid-configuration → jwks_uri). Without
  # OPENID_PROVIDER_URI lakekeeper has no JWKS and treats every token as
  # anonymous — which fails the bootstrap endpoint and any authz check.
  # ADDITIONAL_ISSUERS accepts pipeline-api's iss claim ("datuplet-api" —
  # a plain string, not a URL). AUDIENCE pins lakekeeper to only accept
  # tokens minted for it.
  LAKEKEEPER__OPENID_PROVIDER_URI: {{ include "datuplet-lakekeeper.pipelineApiPublicUrl" . | quote }}
  LAKEKEEPER__OPENID_ADDITIONAL_ISSUERS: "datuplet-api"
  LAKEKEEPER__OPENID_AUDIENCE: "datuplet-catalog"
  # Tells lakekeeper to use OUR pinned model (model_version:collaboration-X)
  # written by datuplet-app's authz-bootstrap instead of its compiled-in default
  # (4.3 for lakekeeper 0.12.0). Without this lakekeeper fails at startup
  # with "Active authorization model with version 4.3 not found in OpenFGA."
  # because we pin our merged Datuplet+lakekeeper DSL as version
  # {{ .Values.platform.fgaModelVersion }}.
  # Also tells lakekeeper to skip its own FGA migration.
  LAKEKEEPER__OPENFGA__CONFIGURED_MODEL_VERSION: {{ .Values.platform.fgaModelVersion | quote }}
  {{- if .Values.platform.enableGcpSystemCredentials }}
  # Enables the gcp-system-identity credential-type in Lakekeeper warehouse
  # registrations. Required when using --gcs-credential-type=system-identity
  # with Workload Identity Federation or Anthos service accounts.
  LAKEKEEPER__ENABLE_GCP_SYSTEM_CREDENTIALS: "true"
  {{- end }}

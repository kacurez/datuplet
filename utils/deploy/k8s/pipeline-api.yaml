---
# pipeline-api Deployment (RFC 002 Slice C; RFC 003 refactor)
#
# Single-replica for MVP — embedded migrations run under
# pg_advisory_lock(20260419), so scaling past one replica requires
# converting the background observer to leader-elect first.
#
# RFC 003: the reaper no longer runs as a goroutine in this Deployment.
# It's a separate CronJob (pipeline-api-reaper.yaml) that invokes
# `pipeline-api reap-once`. The in-process status reconciler has been
# A controller-runtime informer-backed Observer (cmd/pipeline-observer)
# uses pkg/pipelineapi/k8s/coalesce.go to drop identity writes before
# they hit the DB.
#
# See docs/pipeline-api.md for the full startup contract.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-api
  namespace: datuplet-e2e
  labels:
    app: pipeline-api
spec:
  replicas: 1
  strategy:
    # Recreate avoids two replicas briefly owning reconciler + reaper at
    # rollout time. Downtime on the order of seconds is acceptable for
    # MVP; rolling upgrade requires leader election (deferred).
    type: Recreate
  selector:
    matchLabels:
      app: pipeline-api
  template:
    metadata:
      labels:
        app: pipeline-api
    spec:
      serviceAccountName: pipeline-api
      containers:
        - name: pipeline-api
          image: datuplet/pipeline-api:latest
          imagePullPolicy: IfNotPresent
          args: ["serve", "--addr", ":8081"]
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: PIPELINE_API_ADDR
              value: ":8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pipeline-api-db
                  key: DATABASE_URL
            - name: SIGNING_KEY_FILE
              value: "/etc/pipeline-api/signing-key.pem"
            - name: SIGNING_KEY_ID
              value: "key-1"
            # Runs in-cluster with its own ServiceAccount for K8s API
            # access (Namespace + Pipeline CRD + PipelineRun + Secret).
            - name: PIPELINE_API_IN_CLUSTER
              value: "true"
            # RFC 007 Slice 3+9: per-table run tokens carry
            # aud=datuplet-catalog. Lakekeeper verifies them via the OIDC
            # discovery doc + JWKS published below.
            - name: AUDIENCE
              value: "datuplet-catalog"
            # RFC 007 Slice 4: OIDC discovery doc at /.well-known/openid-configuration
            # advertises this URL as `issuer` and points lakekeeper at the
            # JWKS endpoint. Lakekeeper polls it to validate JWT signatures.
            # Must be reachable from lakekeeper's pod — same K8s service DNS
            # works because both run in the cluster.
            - name: PIPELINE_API_PUBLIC_URL
              value: "http://pipeline-api.datuplet-e2e.svc.cluster.local:8081"
            # Serve the browser UI at /ui/* from the bundled static
            # assets (Plan D). Unset PIPELINE_API_UI_DIR to disable.
            - name: PIPELINE_API_UI_DIR
              value: "/app/ui/product"
            - name: DATUPLET_STORAGE_TYPE
              value: "s3"
            - name: DATUPLET_STORAGE_ROOT
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: S3_BUCKET
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: S3_SECRET_KEY
            - name: S3_USE_PATH_STYLE
              value: "true"
            # RFC 007 Slice 9 cluster wiring: pipeline-api's storage
            # handlers proxy /api/v1/storage/* through lakekeeper's REST
            # catalog. Both env vars are read in cmd/pipeline-api/main.go's
            # runServeCluster path; without them the storage SPA falls back
            # to the directory-walker fixture path (legacy /orgs/... layout).
            - name: DATUPLET_LAKEKEEPER_URL
              value: "http://lakekeeper.datuplet-e2e.svc.cluster.local:8181/catalog"
            # RFC 006 Slice 4+5: OPENFGA_URL is the in-cluster gRPC endpoint;
            # OPENFGA_STORE_ID / OPENFGA_MODEL_ID are written by the inline
            # authz Job in deploy-local.sh into Secret datuplet-fga-config.
            # Without these, /api/v1/projects routes don't register and admin
            # subcommands (create-project, grant) error out asking for them.
            # Mirrors the Helm chart's templates/pipeline-api/deployment.yaml.
            - name: OPENFGA_URL
              value: "http://openfga.datuplet-e2e.svc.cluster.local:8080"
            - name: OPENFGA_STORE_ID
              valueFrom:
                secretKeyRef:
                  name: datuplet-fga-config
                  key: store_id
                  # `optional: true` so pipeline-api boots even if D3 hasn't
                  # written the Secret yet — admin commands still need a
                  # rollout-restart on first install once the Secret exists.
                  optional: true
            - name: OPENFGA_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: datuplet-fga-config
                  key: model_id
                  optional: true
            - name: DATUPLET_LAKEKEEPER_WAREHOUSE
              value: "datuplet"
          volumeMounts:
            - name: signing-key
              mountPath: /etc/pipeline-api
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: signing-key
          secret:
            secretName: pipeline-api-signing-key
---
# ClusterIP Service — lakekeeper, other in-cluster consumers, and the
# UI reach pipeline-api at http://pipeline-api.datuplet-e2e.svc.cluster.local:8081/
apiVersion: v1
kind: Service
metadata:
  name: pipeline-api
  namespace: datuplet-e2e
spec:
  selector:
    app: pipeline-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
# NodePort Service — exposes the browser UI + REST API on the OrbStack
# host so developers can open http://localhost:30081/ui/ without any
# additional port-forward. Production deployments should front this
# with an Ingress + TLS and disable the NodePort.
apiVersion: v1
kind: Service
metadata:
  name: pipeline-api-nodeport
  namespace: datuplet-e2e
spec:
  type: NodePort
  selector:
    app: pipeline-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081

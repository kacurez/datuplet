---
# MinIO Secret for credentials
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: datuplet-e2e
type: Opaque
stringData:
  # Standard AWS env var names
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  # S3 env var names (for table-commit).
  # S3_ENDPOINT must be an FQDN: returned to clients verbatim
  # verbatim to DataGateway + TableCommit pods in other namespaces
  # (datuplet-<project-uuid>) via ResolveWrite/ResolveCommit
  # responses, and a bare `minio:9000` only resolves in the namespace
  # MinIO itself lives in. Using the FQDN keeps the same value working
  # from every namespace in the cluster.
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_ENDPOINT: minio.datuplet-e2e.svc.cluster.local:9000
  S3_BUCKET: datuplet
  S3_USE_SSL: "false"
  # Key names expected by pipeline controller
  accessKey: minioadmin
  secretKey: minioadmin
---
# MinIO StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: datuplet-e2e
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-01-16T16-07-38Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_SECRET_ACCESS_KEY
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        # MinIO's /data is backed by a host-path bind mount so the
        # user can inspect the bucket layout directly on their Mac /
        # Linux host after runs, and so the data survives
        # `make undeploy-local` (the StatefulSet is deleted but the
        # host directory is not). The __MINIO_HOST_PATH__ token is
        # substituted by utils/deploy/deploy-local.sh before apply
        # (sed) with the value of $DATUPLET_DATA_HOST_PATH — defaults
        # to $PROJECT_ROOT/tmp/minio-data.
        #
        # OrbStack maps its K8s node's filesystem to the host Mac
        # directly, so hostPath here points straight at your Mac
        # directory — no extra mount config needed. Plain kind is not
        # supported by this manifest (kind's node would have to declare
        # the host path in `extraMounts`).
        - name: data
          hostPath:
            path: __MINIO_HOST_PATH__
            type: DirectoryOrCreate
---
# MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: datuplet-e2e
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# MinIO NodePort Service (for local access)
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: datuplet-e2e
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
---
# MinIO Init Job - creates bucket
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: datuplet-e2e
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-01-16T16-06-34Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be ready..."
              until mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
                echo "MinIO not ready, retrying..."
                sleep 2
              done
              echo "Creating bucket datuplet..."
              mc mb --ignore-existing myminio/datuplet
              echo "MinIO initialization complete"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: AWS_SECRET_ACCESS_KEY

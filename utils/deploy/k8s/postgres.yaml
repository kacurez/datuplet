---
# Postgres Secret — both the superuser password and the full DATABASE_URL
# consumed by pipeline-api. Keeping them in one Secret lets operators
# rotate credentials in a single kubectl edit. Values are plaintext
# because this is the local-dev (OrbStack) deployment; production overlays should
# replace this Secret with one managed by the cluster's secret backend
# (Vault, SealedSecrets, cloud KMS, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: pipeline-api-db
  namespace: datuplet-e2e
type: Opaque
stringData:
  POSTGRES_USER: datuplet
  POSTGRES_PASSWORD: datuplet-local-dev
  POSTGRES_DB: pipelineapi
  # pipeline-api reads DATABASE_URL. Host = Service name; sslmode
  # disabled for in-cluster traffic on the same Pod network. Change to
  # require in production-facing deployments.
  DATABASE_URL: postgres://datuplet:datuplet-local-dev@postgres.datuplet-e2e.svc.cluster.local:5432/pipelineapi?sslmode=disable
---
# Data PVC. 500Mi is enough for the MVP workload — the schema is tiny
# (users, projects, memberships, pipelines, runs, revoked_tokens) and
# rows are on the order of a few hundred bytes each. Bump via kustomize
# for prod, or if you plan to keep a lot of run history.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: datuplet-e2e
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
# Single-replica StatefulSet. pipeline-api is also single-replica (see
# its Deployment with strategy: Recreate), so a single-writer Postgres
# matches that topology without needing leader-elect.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: datuplet-e2e
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pipeline-api-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pipeline-api-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pipeline-api-db
                  key: POSTGRES_DB
            # Postgres 16-alpine needs PGDATA pointed at a subdirectory
            # of the mount so the image's startup script can chown just
            # that subdir. Mounting directly at /var/lib/postgresql/data
            # works too but is fussier about PVC ownership on some hosts.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Probe credentials come from the same env as the server so
          # rotating POSTGRES_USER / POSTGRES_DB in the pipeline-api-db
          # Secret doesn't leave the pod healthy-but-probe-failing.
          # Using sh -c because exec-probe doesn't expand env itself.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# Headless-style ClusterIP Service — pipeline-api reaches Postgres at
# postgres.datuplet-e2e.svc.cluster.local:5432 (the DATABASE_URL in the
# Secret above).
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: datuplet-e2e
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

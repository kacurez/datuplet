# Sample Kubernetes Secret consumed by Pipeline.spec.secretsRef.
#
# Each key under stringData becomes available as $[<key>] in the pipeline
# config of any component in the pipeline that declares:
#
#   spec:
#     secretsRef:
#       name: my-pipeline-secrets
#
# Apply:
#   kubectl apply -f utils/deploy/k8s/rbac/sample-pipeline-secret.yaml -n <your-namespace>
#
# After apply, a pipeline YAML can reference values like:
#
#   components:
#     - name: ingest
#       config:
#         db_password: $[db_password]
#         api_token:   $[api_token]
#
# The DataGateway sidecar mounts this Secret read-only at
# /var/run/secrets/datuplet and resolves the markers before passing the
# config to the component container. The component container itself
# never sees the raw Secret.
apiVersion: v1
kind: Secret
metadata:
  name: my-pipeline-secrets
  namespace: datuplet-e2e
type: Opaque
stringData:
  db_password: hunter2
  api_token: abcdef-123456

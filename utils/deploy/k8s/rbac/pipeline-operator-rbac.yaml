---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-operator
  namespace: datuplet-e2e
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-operator
rules:
  # CRDs - full access. RFC 007 Slice 8: the TableCommit CRD is gone;
  # this operator now schedules commit Jobs directly (covered by the
  # batch/jobs rule below).
  - apiGroups: ["datuplet.io"]
    resources: ["pipelines", "pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["datuplet.io"]
    resources: ["pipelines/status", "pipelineruns/status"]
    verbs: ["get", "update", "patch"]
  # Pods - create and monitor component pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Jobs - for component execution
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps - gateway configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets: NO cluster-wide verbs (RFC 026 P1.5) — mirrors
  # charts/datuplet-app/templates/pipeline-operator/rbac.yaml. The operator
  # reads the managed project Secret and creates the per-run snapshot Secret
  # via the `datuplet-secrets-operator` Role (secrets get,create) that
  # pipeline-api binds to this SA in each project namespace
  # (EnsureProjectNamespace). It runs no Secret informer, so it never needs
  # cluster-wide secret list/watch.
  # Services - discover lakekeeper / pipeline-api
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Events - controller-runtime's recorder both emits and watches Events
  # (used for e.g. recorder bookkeeping and leader-election hints). A
  # missing list/watch perm causes the shared informer to churn every
  # ~30s with "events is forbidden" errors, amplifying reconcile races
  # on Status updates.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-operator
subjects:
  - kind: ServiceAccount
    name: pipeline-operator
    namespace: datuplet-e2e

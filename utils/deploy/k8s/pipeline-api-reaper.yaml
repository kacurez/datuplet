---
# CronJob that runs `pipeline-api reap-once` every 30 minutes.
#
# IMPORTANT deploy-order rule:
#   pipeline-api.yaml must reach condition=available before this is
#   applied. pipeline-api owns migrations; reap-once only reads them and
#   exits with code 2 on a schema mismatch.
#
# Image pinning note: this manifest uses `:latest` matching the
# pipeline-api Deployment's existing tagging strategy. Because the
# CronJob and the Deployment can skew during a rolling deploy (they
# don't share a lifecycle), rollback MUST be done via one of:
#   a) Roll both together (pipeline-api.yaml first, then this file).
#   b) Suspend the CronJob before the Deployment rollback, and
#      unsuspend only after the old image has been restored on
#      pipeline-api:
#        kubectl -n datuplet patch cronjob pipeline-api-reaper \
#          -p '{"spec":{"suspend":true}}'
#        # ... rollback pipeline-api ...
#        kubectl -n datuplet patch cronjob pipeline-api-reaper \
#          -p '{"spec":{"suspend":false}}'
# The embedded schema-version gate in reap-once (exit 2 on mismatch) is
# a safety backstop, not a substitute for these rules. Pinning both
# objects to an immutable tag/digest is the recommended long-term fix
# but is out of scope for RFC 003.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pipeline-api-reaper
  namespace: datuplet-e2e
  labels:
    app: pipeline-api-reaper
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: pipeline-api-reaper
        spec:
          serviceAccountName: pipeline-api-reaper
          restartPolicy: Never
          containers:
            - name: reap
              image: datuplet/pipeline-api:latest
              imagePullPolicy: IfNotPresent
              args: ["reap-once", "--max-age", "24h"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: pipeline-api-db
                      key: DATABASE_URL
                - name: PIPELINE_API_IN_CLUSTER
                  value: "true"
                # RFC 006 Slice 8: the run_tuples sweep DELETEs FGA
                # tuples for terminal/orphan runs. Soft-degrades when
                # the URL is unreachable — the row is still GC'd, the
                # FGA-side tuple just lingers until next sweep / a
                # manual repair. Auto-discovery looks up the
                # `datuplet` store + model when STORE_ID / MODEL_ID
                # are unset; setting them avoids the discovery RTT.
                - name: OPENFGA_URL
                  value: "http://openfga.datuplet-e2e.svc.cluster.local:8080"
                # OPENFGA_STORE_ID / OPENFGA_MODEL_ID intentionally
                # unset — the reaper auto-discovers them on each tick.
                # Set them explicitly if you want to skip the
                # discovery RTT in long-lived clusters.
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "20m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"

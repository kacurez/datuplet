---
# Lakekeeper — Iceberg REST Catalog (RFC 007).
#
# Single-namespace topology — everything lives in `datuplet-e2e`,
# matching the Helm chart's single-namespace shape (RFC 012) with a
# distinct name so a chart install in `datuplet` and `make deploy-local`
# can coexist.
#
# In-cluster network access (all `datuplet-e2e`):
#   - postgres.datuplet-e2e.svc.cluster.local:5432  (lakekeeper-only DB)
#   - minio.datuplet-e2e.svc.cluster.local:9000     (warehouse storage)
# Service publishes:
#   - lakekeeper.datuplet-e2e.svc.cluster.local:8181 (catalog REST + management)
#
# Auth posture (RFC 006 Slice 2):
#   AUTHZ_BACKEND=openfga — all management calls checked via OpenFGA.
#   OIDC: lakekeeper validates JWTs from pipeline-api (RFC 007 Slice 4).
#   OpenFGA instance: openfga.datuplet-e2e.svc.cluster.local (RFC 006 Slice 2).
#   deploy-local.sh runs the FGA bootstrap Job BEFORE lakekeeper starts,
#   which uploads the Datuplet extended FGA model.
# Secrets that lakekeeper needs to function:
#   - PG_ENCRYPTION_KEY: lakekeeper encrypts vended-creds-related secrets
#     in its own DB with this key. Rotating it invalidates any stored
#     storage credentials. POC uses a fixed dev value; production overlays
#     replace this Secret via Vault / SealedSecrets.
#   - PG_DATABASE_URL_*: DSNs lakekeeper uses for its metadata DB. Reuses
#     the existing Postgres in the datuplet namespace, on a separate
#     `lakekeeper` database (created by the lakekeeper-init-db initContainer).
#     The 'datuplet' postgres user has CREATE DATABASE permission as the
#     superuser in this dev setup, so the same credentials work for both
#     the bootstrap psql call and the lakekeeper runtime.
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-config
  namespace: datuplet-e2e
type: Opaque
stringData:
  LAKEKEEPER__PG_ENCRYPTION_KEY: lakekeeper-poc-not-secure
  LAKEKEEPER__PG_DATABASE_URL_READ: postgres://datuplet:datuplet-local-dev@postgres.datuplet-e2e.svc.cluster.local:5432/lakekeeper
  LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://datuplet:datuplet-local-dev@postgres.datuplet-e2e.svc.cluster.local:5432/lakekeeper
  # Postgres superuser credentials — only used by the init-db initContainer
  # to issue `CREATE DATABASE lakekeeper`. Lakekeeper itself reads via
  # PG_DATABASE_URL_*. Same credentials, different surface.
  POSTGRES_HOST: postgres.datuplet-e2e.svc.cluster.local
  POSTGRES_USER: datuplet
  POSTGRES_PASSWORD: datuplet-local-dev
  POSTGRES_ADMIN_DB: postgres
---
# Lakekeeper Deployment.
#
# Single replica — Postgres handles all coordination via row locks, so
# multiple lakekeeper replicas would just compete on the same DB. Until
# we have a real reason to scale (we don't, yet), one replica keeps
# things simple.
#
# Init containers:
#   1) init-db: psql against the postgres admin DB to ensure the
#      `lakekeeper` database exists. Idempotent — `CREATE DATABASE` errors
#      with "already exists" are swallowed.
#   2) migrate: lakekeeper's own `migrate` subcommand applies its schema
#      to the freshly-created (or pre-existing) database. Idempotent.
#
# Both run on every Pod restart, which is fine — both are idempotent and
# run in <2s against an already-migrated DB.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakekeeper
  namespace: datuplet-e2e
  labels:
    app: lakekeeper
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) because lakekeeper holds advisory
    # locks during migrate; a rolling update would mean a brief window
    # of two replicas both running migrate against the same DB.
    type: Recreate
  selector:
    matchLabels:
      app: lakekeeper
  template:
    metadata:
      labels:
        app: lakekeeper
    spec:
      initContainers:
        - name: init-db
          image: postgres:16-alpine
          # Block until postgres is reachable, then idempotently CREATE DATABASE.
          # `psql -tAc` returns 0 even on duplicate-database errors so the pod
          # comes up cleanly on second deploy.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for postgres at $POSTGRES_HOST:5432 ..."
              until pg_isready -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_ADMIN_DB" -p 5432; do
                sleep 2
              done
              # Check if database exists; create if missing. Keeps us from
              # firing CREATE DATABASE on every pod restart.
              EXISTS=$(PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_ADMIN_DB" -tAc "SELECT 1 FROM pg_database WHERE datname='lakekeeper'")
              if [ "$EXISTS" != "1" ]; then
                echo "Creating lakekeeper database..."
                PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_ADMIN_DB" -c "CREATE DATABASE lakekeeper"
              else
                echo "lakekeeper database already exists"
              fi
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-config
                  key: POSTGRES_HOST
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-config
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_ADMIN_DB
              valueFrom:
                secretKeyRef:
                  name: lakekeeper-config
                  key: POSTGRES_ADMIN_DB
        - name: migrate
          image: quay.io/lakekeeper/catalog:v0.12.1
          imagePullPolicy: IfNotPresent
          command: ["/home/nonroot/lakekeeper", "migrate"]
          envFrom:
            - secretRef:
                name: lakekeeper-config
                # POSTGRES_* keys are noise here (only init-db needs them)
                # but lakekeeper's `migrate` only consumes LAKEKEEPER__*
                # keys so the extras are harmless.
      containers:
        - name: lakekeeper
          image: quay.io/lakekeeper/catalog:v0.12.1
          imagePullPolicy: IfNotPresent
          command: ["/home/nonroot/lakekeeper", "serve"]
          ports:
            - containerPort: 8181
              name: http
          env:
            # RFC 006 Slice 2: switched from allowall to openfga authz backend.
            # CONFIGURED_MODEL_VERSION tells lakekeeper to skip its own OpenFGA
            # migration — deploy-local.sh runs the FGA bootstrap Job BEFORE
            # lakekeeper starts, which uploads the extended collaboration-4.4
            # model. Lakekeeper reads the model by version label without
            # overwriting it.
            - name: LAKEKEEPER__AUTHZ_BACKEND
              value: openfga
            - name: LAKEKEEPER__OPENFGA__ENDPOINT
              value: "http://openfga.datuplet-e2e.svc.cluster.local:8081"
            - name: LAKEKEEPER__OPENFGA__STORE_NAME
              value: datuplet
            - name: LAKEKEEPER__OPENFGA__CONFIGURED_MODEL_VERSION
              value: "4.4"
            # RFC 007 Slice 4 — OIDC validation against pipeline-api.
            # PROVIDER_URI hosts /.well-known/openid-configuration which
            # advertises the JWKS URL; lakekeeper auto-discovers and polls
            # the JWKS to validate JWT signatures locally. AUDIENCE is the
            # constant from tokens.TableTokenAudience (see RFC 007 Slice 3).
            # ADDITIONAL_ISSUERS lets pipeline-api keep iss=datuplet-api
            # (a non-URL issuer) without breaking the discovery contract;
            # the discovery doc's primary issuer is the URL form.
            - name: LAKEKEEPER__OPENID_PROVIDER_URI
              value: "http://pipeline-api.datuplet-e2e.svc.cluster.local:8081"
            - name: LAKEKEEPER__OPENID_AUDIENCE
              value: "datuplet-catalog"
            - name: LAKEKEEPER__OPENID_ADDITIONAL_ISSUERS
              value: "datuplet-api"
          envFrom:
            - secretRef:
                name: lakekeeper-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command: ["/home/nonroot/lakekeeper", "healthcheck"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["/home/nonroot/lakekeeper", "healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 20
---
# ClusterIP Service. Lakekeeper is reached cluster-internally only at:
#   http://lakekeeper.datuplet-e2e.svc.cluster.local:8181
#
# No NodePort: lakekeeper is not a user-facing surface in this slice
# (the SPA still talks through pipeline-api). If you need to poke at the
# REST API from your Mac during dev, use:
#   kubectl -n lakekeeper port-forward svc/lakekeeper 8181:8181
apiVersion: v1
kind: Service
metadata:
  name: lakekeeper
  namespace: datuplet-e2e
spec:
  selector:
    app: lakekeeper
  ports:
    - name: http
      port: 8181
      targetPort: 8181
---
# Bootstrap is no longer a stand-alone curl-shaped Job (RFC 007 Slice 4):
# every /management/v1 endpoint now requires a valid JWT, and a generic
# curl image has no way to mint one. Instead, deploy-local.sh runs
# `kubectl exec deploy/pipeline-api -- pipeline-api admin lakekeeper-bootstrap`
# after the lakekeeper Deployment is healthy. Pipeline-api's binary has
# the signing key mounted, so it can mint a service-account JWT in-process
# and POST /bootstrap + /warehouse from there. Idempotent (probe-first).

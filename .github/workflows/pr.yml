name: PR validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel in-flight runs for the same ref on new pushes; saves runner minutes.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  go:
    name: go vet + go test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

      - name: go test (integration — GCS backend + datupleticeio)
        # Validates pkg/datagateway/backend/gcs.go + pkg/datupleticeio
        # against fsouza/fake-gcs-server via testcontainers. Docker is
        # available on ubuntu-latest runners by default; no extra setup.
        # See RFC 019 §B.3-B.4 for what this covers.
        run: |
          go test -tags=integration -count=1 -timeout 10m \
            ./pkg/datagateway/backend/... \
            ./pkg/datupleticeio/...

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        chart:
          - datuplet-operators
          - datuplet-infra
          - datuplet-app
          - datuplet-lakekeeper
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Add chart dependency repos
        # `helm dependency build` (unlike `update`) requires each dependency's
        # repo to be locally registered — it won't auto-fetch "unmanaged" repos.
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add openfga https://openfga.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add lakekeeper https://lakekeeper.github.io/lakekeeper-charts

      - name: helm dependency build
        run: helm dependency build charts/${{ matrix.chart }}

      - name: helm lint
        run: helm lint charts/${{ matrix.chart }}

      - name: helm template
        run: |
          helm template ${{ matrix.chart }} charts/${{ matrix.chart }} \
            --namespace datuplet > /tmp/${{ matrix.chart }}.yaml
          # Sanity: rendered output should be non-trivial.
          test "$(wc -l < /tmp/${{ matrix.chart }}.yaml)" -gt 50

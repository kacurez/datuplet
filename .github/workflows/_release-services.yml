name: release-services

# Reusable: builds + manifests the five datuplet service images
# (pipeline-api, pipeline-observer, pipeline-operator, gateway,
# query-worker). Each is a call to _release-image.yml. Called once from
# release.yml as the `services` job; appears as a collapsible group in the
# run-detail UI containing 15 flat entries (5 images × 3 sub-jobs).

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  pipeline-api:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-api
      dockerfile: utils/docker/Dockerfile.pipeline-api
    secrets: inherit

  pipeline-observer:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-observer
      dockerfile: utils/docker/Dockerfile.pipeline-observer
    secrets: inherit

  pipeline-operator:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-operator
      dockerfile: utils/docker/Dockerfile.pipeline-operator
    secrets: inherit

  gateway:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: gateway
      dockerfile: utils/docker/Dockerfile.gateway
    secrets: inherit

  # query-worker (RFC 022): the ad-hoc SQL query service Deployment image,
  # referenced by datuplet-app's queryWorker.image. Distinct dockerfile path
  # (query-worker.Dockerfile, not Dockerfile.query-worker) — it bakes the
  # DuckDB iceberg/httpfs extensions, so it is CGO + multi-arch like gateway.
  query-worker:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: query-worker
      dockerfile: utils/docker/query-worker.Dockerfile
    secrets: inherit

name: release-build

# Reusable: builds every image's per-platform layer + pushes by digest.
# Called by release.yml on tag push. The parent's run-detail UI shows
# this as one collapsible group ("build images") containing 20 sub-jobs
# (10 images × 2 platforms).

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    # Colon-separated, not slash — GitHub's nested-workflow sidebar uses
    # the slash as a hierarchy delimiter and renders only the last
    # segment. Colon keeps both pieces visible in the sidebar
    # (e.g. "pipeline-api:amd64").
    name: ${{ matrix.image.name }}:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - name: pipeline-api
            dockerfile: utils/docker/Dockerfile.pipeline-api
          - name: pipeline-observer
            dockerfile: utils/docker/Dockerfile.pipeline-observer
          - name: pipeline-operator
            dockerfile: utils/docker/Dockerfile.pipeline-operator
          - name: gateway
            dockerfile: utils/docker/Dockerfile.gateway
          - name: iceberg-job
            dockerfile: utils/docker/Dockerfile.iceberg-job
          - name: data-generator
            dockerfile: components/data-generator/Dockerfile
          - name: sql-transform
            dockerfile: components/sql-transform/Dockerfile
          - name: stdout-writer
            dockerfile: components/stdout-writer/Dockerfile
          - name: http-json-extractor
            dockerfile: components/http-json-extractor/Dockerfile
          - name: finnhub-extractor
            dockerfile: components/finnhub-extractor/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          # push-by-digest: push manifest list entries by content digest,
          # without a tag. The manifest workflow stitches per-platform
          # digests into a single tagged multi-arch manifest list.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

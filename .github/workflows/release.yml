name: release

on:
  push:
    tags:
      - 'v*.*.*'

# These are the maximum permissions any called workflow can request.
# The reusable build + manifest workflows declare their own (narrower)
# permissions blocks.
permissions:
  contents: write    # charts job: gh-pages bootstrap + chart-releaser commits + Release entries
  packages: write    # build + manifest workflows: ghcr.io push

env:
  REGISTRY: ghcr.io

jobs:
  # Reusable workflow call — appears as ONE collapsible "build images"
  # entry in the run-detail UI, containing 20 sub-jobs (10 images × 2 archs).
  build:
    name: build images
    uses: ./.github/workflows/_release-build.yml
    secrets: inherit

  # Reusable workflow call — appears as ONE collapsible "manifest images"
  # entry containing 10 sub-jobs (one tagged multi-arch manifest per image).
  manifest:
    name: manifest images
    needs: build
    uses: ./.github/workflows/_release-manifest.yml
    secrets: inherit

  charts:
    name: package + publish helm charts
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Resolve version tag
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pin chart image tags + versions to release tag
        env:
          VERSION:  ${{ steps.meta.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER:    ${{ github.repository_owner }}
        run: |
          set -eu
          APP_VALUES=charts/datuplet-app/values.yaml
          INFRA_VALUES=charts/datuplet-infra/values.yaml

          # Repoint image.repository to ghcr.io/<owner>/<image>. The five
          # image refs in datuplet-app and the one in datuplet-infra are
          # the only "repository: datuplet/X" lines in these files, so
          # bare-line sed is unambiguous.
          for img in pipeline-api pipeline-operator pipeline-observer gateway iceberg-job; do
            sed -i "s|repository: datuplet/${img}\$|repository: ${REGISTRY}/${OWNER}/${img}|" "$APP_VALUES"
          done
          sed -i "s|repository: datuplet/pipeline-api\$|repository: ${REGISTRY}/${OWNER}/pipeline-api|" "$INFRA_VALUES"

          # Pin every `tag: latest` line in both values files to the
          # release version. No other "tag: latest" lines appear in these
          # files (grep verifies before substitution). Note: -P (PCRE)
          # cannot be combined with -E (ERE) in GNU grep — drop -E.
          for f in "$APP_VALUES" "$INFRA_VALUES"; do
            if grep -qP "tag:[[:space:]]+(?!latest$)" "$f"; then
              echo "ERROR: $f has a non-'latest' tag line; refusing blanket replace" >&2
              grep -nE "tag:" "$f" >&2 || true
              exit 1
            fi
            sed -i "s|tag: latest|tag: ${VERSION}|g" "$f"
          done

          echo "--- pinned datuplet-app values (image block) ---"
          sed -n '1,28p' "$APP_VALUES"
          echo "--- pinned datuplet-infra values (image block) ---"
          sed -n '1,10p' "$INFRA_VALUES"

          # Bump every chart's Chart.yaml version + appVersion to match
          # the release tag.
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            sed -i -E "s|^version: .*\$|version: ${VERSION}|" "charts/${chart}/Chart.yaml"
            sed -i -E "s|^appVersion: .*\$|appVersion: \"${VERSION}\"|" "charts/${chart}/Chart.yaml"
          done
          echo "--- Chart.yaml versions ---"
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            echo "[$chart]"
            grep -E "^version:|^appVersion:" "charts/${chart}/Chart.yaml" || true
          done

      - name: Bootstrap gh-pages branch if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists; nothing to bootstrap."
            exit 0
          fi
          echo "gh-pages missing; creating orphan branch with .nojekyll."
          # Stash any unstaged changes from the chart-pin step so the
          # orphan-branch checkout doesn't carry them. Restore after.
          git stash -u --include-untracked --quiet || true
          git switch --orphan gh-pages
          # Clean any inherited files; orphan branch starts empty.
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll
          git add .nojekyll
          git commit -m "Initialize gh-pages branch"
          git push --set-upstream origin gh-pages
          # Switch back to the tagged commit so chart-releaser sees the
          # pinned chart values. The stash carried the chart-pin edits.
          git switch --detach "${GITHUB_SHA}"
          git stash pop --quiet || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"

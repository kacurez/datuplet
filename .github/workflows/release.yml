name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write    # chart-releaser commits to gh-pages + creates Releases
  packages: write    # ghcr.io image push

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.image.name }} / ${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        image:
          - name: pipeline-api
            dockerfile: utils/docker/Dockerfile.pipeline-api
          - name: pipeline-observer
            dockerfile: utils/docker/Dockerfile.pipeline-observer
          - name: pipeline-operator
            dockerfile: utils/docker/Dockerfile.pipeline-operator
          - name: gateway
            dockerfile: utils/docker/Dockerfile.gateway
          - name: iceberg-job
            dockerfile: utils/docker/Dockerfile.iceberg-job
          - name: data-generator
            dockerfile: components/data-generator/Dockerfile
          - name: sql-transform
            dockerfile: components/sql-transform/Dockerfile
          - name: stdout-writer
            dockerfile: components/stdout-writer/Dockerfile
          - name: http-json-extractor
            dockerfile: components/http-json-extractor/Dockerfile
          - name: finnhub-extractor
            dockerfile: components/finnhub-extractor/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          # push-by-digest: push manifest list entries by content digest,
          # without a tag. The `manifest` job below stitches per-platform
          # digests into a single tagged multi-arch manifest list.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: ${{ matrix.image }} manifest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        image:
          - pipeline-api
          - pipeline-observer
          - pipeline-operator
          - gateway
          - iceberg-job
          - data-generator
          - sql-transform
          - stdout-writer
          - http-json-extractor
          - finnhub-extractor
    steps:
      - name: Resolve version tags
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"          # v0.1.0
          VERSION="${REF#v}"                        # 0.1.0
          MINOR="${VERSION%.*}"                     # 0.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"

      - name: Download per-arch digests for this image
        uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -eu
          IMG=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          cd /tmp/digests
          docker buildx imagetools create \
            -t "$IMG:${{ steps.meta.outputs.version }}" \
            -t "$IMG:${{ steps.meta.outputs.minor }}" \
            -t "$IMG:latest" \
            $(printf "${IMG}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  charts:
    name: package + publish helm charts
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Resolve version tag
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pin chart image tags + versions to release tag
        env:
          VERSION:  ${{ steps.meta.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER:    ${{ github.repository_owner }}
        run: |
          set -eu
          APP_VALUES=charts/datuplet-app/values.yaml
          INFRA_VALUES=charts/datuplet-infra/values.yaml

          # Repoint image.repository to ghcr.io/<owner>/<image>. The five
          # image refs in datuplet-app and the one in datuplet-infra are
          # the only "repository: datuplet/X" lines in these files, so
          # bare-line sed is unambiguous.
          for img in pipeline-api pipeline-operator pipeline-observer gateway iceberg-job; do
            sed -i "s|repository: datuplet/${img}\$|repository: ${REGISTRY}/${OWNER}/${img}|" "$APP_VALUES"
          done
          sed -i "s|repository: datuplet/pipeline-api\$|repository: ${REGISTRY}/${OWNER}/pipeline-api|" "$INFRA_VALUES"

          # Pin every `tag: latest` line in both values files to the
          # release version. No other "tag: latest" lines appear in these
          # files (grep verifies before substitution). Note: -P (PCRE)
          # cannot be combined with -E (ERE) in GNU grep — drop -E.
          for f in "$APP_VALUES" "$INFRA_VALUES"; do
            if grep -qP "tag:[[:space:]]+(?!latest$)" "$f"; then
              echo "ERROR: $f has a non-'latest' tag line; refusing blanket replace" >&2
              grep -nE "tag:" "$f" >&2 || true
              exit 1
            fi
            sed -i "s|tag: latest|tag: ${VERSION}|g" "$f"
          done

          echo "--- pinned datuplet-app values (image block) ---"
          sed -n '1,28p' "$APP_VALUES"
          echo "--- pinned datuplet-infra values (image block) ---"
          sed -n '1,10p' "$INFRA_VALUES"

          # Bump every chart's Chart.yaml version + appVersion to match
          # the release tag.
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            sed -i -E "s|^version: .*\$|version: ${VERSION}|" "charts/${chart}/Chart.yaml"
            sed -i -E "s|^appVersion: .*\$|appVersion: \"${VERSION}\"|" "charts/${chart}/Chart.yaml"
          done
          echo "--- Chart.yaml versions ---"
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            echo "[$chart]"
            grep -E "^version:|^appVersion:" "charts/${chart}/Chart.yaml" || true
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"

name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Serialize release runs: two tags pushed close together would otherwise run
# chart-releaser concurrently against gh-pages and one git push loses the
# race. No cancel-in-progress — a started release must run to completion.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write    # charts job: gh-pages bootstrap + chart-releaser commits
  packages: write    # image jobs (via reusable workflows): ghcr.io push

jobs:
  # Guards that the pushed tag matches the version/appVersion already
  # committed in every chart's Chart.yaml — charts publish exactly as
  # committed, no in-CI rewriting. Run `make bump-version VERSION=X.Y.Z`,
  # commit, then tag.
  verify-tag:
    name: tag matches committed chart versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Verify
        run: |
          set -eu
          VERSION="${GITHUB_REF#refs/tags/v}"
          fail=0
          for c in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            v=$(sed -n 's/^version: *//p' "charts/$c/Chart.yaml")
            av=$(sed -n 's/^appVersion: *"\{0,1\}\([^"]*\)"\{0,1\} *$/\1/p' "charts/$c/Chart.yaml")
            [ "$v" = "$VERSION" ]  || { echo "::error::charts/$c version=$v != tag $VERSION"; fail=1; }
            [ "$av" = "$VERSION" ] || { echo "::error::charts/$c appVersion=$av != tag $VERSION"; fail=1; }
          done
          # Built-in ComponentDefinitions pin components.tag as their (stable,
          # v-prefixed) version + image tag. It must equal v<VERSION> so a release
          # never publishes charts whose built-ins reference an unpublished image
          # tag. bump-version keeps it in sync; this guards a hand-edit that didn't.
          # components.tag is the only 2-space-indented `tag:` line (the image
          # tags under image:/queryWorker.image are 4-space and default to "").
          ct=$(sed -n 's/^  tag: *//p' charts/datuplet-app/values.yaml | tail -1)
          [ "$ct" = "v$VERSION" ] || { echo "::error::charts/datuplet-app components.tag=$ct != v$VERSION (run 'make bump-version')"; fail=1; }
          [ $fail -eq 0 ] || { echo "::error::Run 'make bump-version VERSION=$VERSION', commit, then re-tag."; exit 1; }

  # Service images: pipeline-api, pipeline-observer, pipeline-operator,
  # gateway, query-worker. Appears as one top-level "services" row in
  # the run-detail UI; expanding shows 15 flat entries (5 images × 3
  # sub-jobs) named "<image>:amd64", "<image>:arm64", "<image>:manifest".
  # Per-image collapsible groups inside the bucket aren't possible —
  # GitHub Actions flattens nested-reusable-workflow jobs at runtime.
  services:
    needs: verify-tag
    uses: ./.github/workflows/_release-services.yml
    secrets: inherit

  # Component images: data-generator, sql-transform, stdout-writer,
  # http-json-extractor, finnhub-extractor. Same UI shape as the
  # services bucket.
  components:
    needs: verify-tag
    uses: ./.github/workflows/_release-components.yml
    secrets: inherit

  charts:
    name: package + publish helm charts
    needs: [services, components]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Bootstrap gh-pages branch if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists; nothing to bootstrap."
            exit 0
          fi
          echo "gh-pages missing; creating orphan branch with .nojekyll."
          git stash -u --include-untracked --quiet || true
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll
          git add .nojekyll
          git commit -m "Initialize gh-pages branch"
          git push --set-upstream origin gh-pages
          git switch --detach "${GITHUB_SHA}"
          git stash pop --quiet || true

      - name: Add chart dependency repos + build
        # chart-releaser packages each chart in charts_dir; a chart with a
        # committed Chart.lock is packaged via `helm dependency build`, which
        # (unlike `update`) needs every dependency repo locally registered and
        # won't auto-fetch "unmanaged" repos. Build the subchart tarballs here,
        # AFTER the gh-pages bootstrap's branch dance, so they're present when
        # chart-releaser runs. datuplet-app has no dependencies.
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add openfga https://openfga.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add lakekeeper https://lakekeeper.github.io/lakekeeper-charts
          for c in datuplet-operators datuplet-infra datuplet-lakekeeper; do
            helm dependency build "charts/$c"
          done

      - name: Run chart-releaser
        # packages_with_index=true uploads chart tarballs directly to the
        # gh-pages branch alongside index.yaml; it BYPASSES the GitHub
        # Releases API entirely. This is the no-PAT path: GITHUB_TOKEN's
        # contents:write is sufficient for the git push, but the same
        # token consistently returns 403 on POST /repos/.../releases for
        # personal-account public repos (an undocumented limit). Helm
        # consumers only read index.yaml, so `helm repo add` works
        # identically — we just don't get per-chart entries on the
        # GitHub Releases page.
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
          packages_with_index: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"

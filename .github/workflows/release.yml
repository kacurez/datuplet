name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write    # charts job: gh-pages bootstrap + chart-releaser commits
  packages: write    # image jobs: ghcr.io push

env:
  REGISTRY: ghcr.io

jobs:
  # Per-image reusable workflow call. Each entry below appears as one
  # collapsible row in the run-detail UI labeled with the image name.
  # Inside each row: amd64 / arm64 / manifest sub-jobs.
  pipeline-api:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-api
      dockerfile: utils/docker/Dockerfile.pipeline-api
    secrets: inherit

  pipeline-observer:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-observer
      dockerfile: utils/docker/Dockerfile.pipeline-observer
    secrets: inherit

  pipeline-operator:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: pipeline-operator
      dockerfile: utils/docker/Dockerfile.pipeline-operator
    secrets: inherit

  gateway:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: gateway
      dockerfile: utils/docker/Dockerfile.gateway
    secrets: inherit

  iceberg-job:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: iceberg-job
      dockerfile: utils/docker/Dockerfile.iceberg-job
    secrets: inherit

  data-generator:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: data-generator
      dockerfile: components/data-generator/Dockerfile
    secrets: inherit

  sql-transform:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: sql-transform
      dockerfile: components/sql-transform/Dockerfile
    secrets: inherit

  stdout-writer:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: stdout-writer
      dockerfile: components/stdout-writer/Dockerfile
    secrets: inherit

  http-json-extractor:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: http-json-extractor
      dockerfile: components/http-json-extractor/Dockerfile
    secrets: inherit

  finnhub-extractor:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: finnhub-extractor
      dockerfile: components/finnhub-extractor/Dockerfile
    secrets: inherit

  charts:
    name: package + publish helm charts
    needs:
      - pipeline-api
      - pipeline-observer
      - pipeline-operator
      - gateway
      - iceberg-job
      - data-generator
      - sql-transform
      - stdout-writer
      - http-json-extractor
      - finnhub-extractor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use the RELEASE_TOKEN PAT so subsequent git pushes and
          # chart-releaser's Release-creation API calls use the PAT's
          # identity, not GITHUB_TOKEN. GITHUB_TOKEN's Contents:write is
          # silently insufficient for repos.releases.create on
          # personal-account public repos.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Resolve version tag
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pin chart image tags + versions to release tag
        env:
          VERSION:  ${{ steps.meta.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          OWNER:    ${{ github.repository_owner }}
        run: |
          set -eu
          APP_VALUES=charts/datuplet-app/values.yaml
          INFRA_VALUES=charts/datuplet-infra/values.yaml

          # Repoint image.repository to ghcr.io/<owner>/<image>. The five
          # image refs in datuplet-app and the one in datuplet-infra are
          # the only "repository: datuplet/X" lines in these files, so
          # bare-line sed is unambiguous.
          for img in pipeline-api pipeline-operator pipeline-observer gateway iceberg-job; do
            sed -i "s|repository: datuplet/${img}\$|repository: ${REGISTRY}/${OWNER}/${img}|" "$APP_VALUES"
          done
          sed -i "s|repository: datuplet/pipeline-api\$|repository: ${REGISTRY}/${OWNER}/pipeline-api|" "$INFRA_VALUES"

          # Pin every `tag: latest` line in both values files to the
          # release version. No other "tag: latest" lines appear in these
          # files (grep verifies before substitution). Note: -P (PCRE)
          # cannot be combined with -E (ERE) in GNU grep — drop -E.
          for f in "$APP_VALUES" "$INFRA_VALUES"; do
            if grep -qP "tag:[[:space:]]+(?!latest$)" "$f"; then
              echo "ERROR: $f has a non-'latest' tag line; refusing blanket replace" >&2
              grep -nE "tag:" "$f" >&2 || true
              exit 1
            fi
            sed -i "s|tag: latest|tag: ${VERSION}|g" "$f"
          done

          echo "--- pinned datuplet-app values (image block) ---"
          sed -n '1,28p' "$APP_VALUES"
          echo "--- pinned datuplet-infra values (image block) ---"
          sed -n '1,10p' "$INFRA_VALUES"

          # Bump every chart's Chart.yaml version + appVersion to match
          # the release tag.
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            sed -i -E "s|^version: .*\$|version: ${VERSION}|" "charts/${chart}/Chart.yaml"
            sed -i -E "s|^appVersion: .*\$|appVersion: \"${VERSION}\"|" "charts/${chart}/Chart.yaml"
          done
          echo "--- Chart.yaml versions ---"
          for chart in datuplet-operators datuplet-infra datuplet-app datuplet-lakekeeper; do
            echo "[$chart]"
            grep -E "^version:|^appVersion:" "charts/${chart}/Chart.yaml" || true
          done

      - name: Bootstrap gh-pages branch if it does not exist
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists; nothing to bootstrap."
            exit 0
          fi
          echo "gh-pages missing; creating orphan branch with .nojekyll."
          git stash -u --include-untracked --quiet || true
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll
          git add .nojekyll
          git commit -m "Initialize gh-pages branch"
          git push --set-upstream origin gh-pages
          git switch --detach "${GITHUB_SHA}"
          git stash pop --quiet || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
          token: ${{ secrets.RELEASE_TOKEN }}
        env:
          CR_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CR_SKIP_EXISTING: "true"

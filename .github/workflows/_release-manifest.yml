name: release-manifest

# Reusable: stitches per-platform digests from the build workflow into
# a single tagged multi-arch manifest list per image. Called by release.yml
# after build completes. The parent's run-detail UI shows this as one
# collapsible group ("manifest images") containing 10 sub-jobs.

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  manifest:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        image:
          - pipeline-api
          - pipeline-observer
          - pipeline-operator
          - gateway
          - iceberg-job
          - data-generator
          - sql-transform
          - stdout-writer
          - http-json-extractor
          - finnhub-extractor
    steps:
      - name: Resolve version tags
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"          # v0.1.2
          VERSION="${REF#v}"                        # 0.1.2
          MINOR="${VERSION%.*}"                     # 0.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"

      - name: Download per-arch digests for this image
        uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -eu
          IMG=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          cd /tmp/digests
          docker buildx imagetools create \
            -t "$IMG:${{ steps.meta.outputs.version }}" \
            -t "$IMG:${{ steps.meta.outputs.minor }}" \
            -t "$IMG:latest" \
            $(printf "${IMG}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

name: release-components

# Reusable: builds + manifests the five built-in component images
# (data-generator, sql-transform, stdout-writer, http-json-extractor,
# finnhub-extractor). Each is a call to _release-image.yml. Called once
# from release.yml as the `components` job; appears as a collapsible
# group in the run-detail UI containing the five image rows.

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  data-generator:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: data-generator
      dockerfile: components/data-generator/Dockerfile
    secrets: inherit

  sql-transform:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: sql-transform
      dockerfile: components/sql-transform/Dockerfile
    secrets: inherit

  stdout-writer:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: stdout-writer
      dockerfile: components/stdout-writer/Dockerfile
    secrets: inherit

  http-json-extractor:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: http-json-extractor
      dockerfile: components/http-json-extractor/Dockerfile
    secrets: inherit

  finnhub-extractor:
    uses: ./.github/workflows/_release-image.yml
    with:
      name: finnhub-extractor
      dockerfile: components/finnhub-extractor/Dockerfile
    secrets: inherit

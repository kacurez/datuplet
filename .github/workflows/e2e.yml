name: e2e

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: kind + helm + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          # The query-worker image (CGO + baked DuckDB iceberg/httpfs
          # extensions) is large, and every built image is duplicated into
          # kind's containerd on load — together with the deployed pods'
          # Postgres/MinIO volumes that overran the hosted runner's default
          # free disk ("no space left on device" during deploy). Reclaim
          # toolchains this job never uses.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.23.0
          cluster_name: datuplet-e2e
          # Bump kind's default node-image to a recent K8s minor;
          # matches the K8s versions Datuplet targets in production.
          node_image: kindest/node:v1.30.0

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Build images
        run: make docker-build-k8s build-components-e2e

      - name: Load images into kind
        run: |
          set -eu
          # nginx backs the in-cluster http-fixture (RFC 024 W7 T7.4) that
          # replaces jsonplaceholder.typicode.com; it isn't built locally so
          # it must be pulled before it can be kind-loaded like the others.
          docker pull public.ecr.aws/nginx/nginx:1.27-alpine
          for img in \
            datuplet/pipeline-api:latest \
            datuplet/pipeline-observer:latest \
            datuplet/pipeline-operator:latest \
            datuplet/gateway:latest \
            datuplet/data-generator:latest \
            datuplet/sql-transform:latest \
            datuplet/stdout-writer:latest \
            datuplet/http-json-extractor:latest \
            datuplet/query-worker:latest \
            public.ecr.aws/nginx/nginx:1.27-alpine \
          ; do
            kind load docker-image --name datuplet-e2e "$img"
          done

      - name: Reclaim disk after kind load
        run: |
          # The images now live in kind's containerd; the host docker copies
          # and the buildx cache are dead weight during deploy.
          docker image prune --all --force || true
          docker builder prune --all --force || true
          df -h /

      - name: Run e2e (deploy + test + teardown)
        env:
          E2E_JSON: /tmp/e2e-report.json
        run: make e2e-k8s-deploy

      - name: Test summary
        if: always()
        run: |
          set -eu
          [ -f /tmp/e2e-report.json ] || { echo "no e2e report produced" >> "$GITHUB_STEP_SUMMARY"; exit 0; }
          {
            echo "## e2e results"
            echo '| outcome | count |'; echo '|---|---|'
            for a in pass fail skip; do
              n=$(jq -r --arg a "$a" 'select(.Action==$a and .Test!=null) | .Test' /tmp/e2e-report.json | wc -l)
              echo "| $a | $n |"
            done
            echo; echo "### skipped"
            jq -r 'select(.Action=="skip" and .Test!=null) | "- \(.Test)"' /tmp/e2e-report.json
          } >> "$GITHUB_STEP_SUMMARY"

      # GCS e2e (`make e2e-k8s-gcs`) is intentionally NOT wired here.
      # Lakekeeper hardcodes storage.googleapis.com — no GCS endpoint
      # override exists in its config (verified in crates/lakekeeper/
      # src/service/storage/gcs/mod.rs). Until either (a) real GCP
      # credentials are wired via GH Actions secrets, or (b) an upstream
      # Lakekeeper PR adds an endpoint override, the fake-gcs-server
      # harness can't exercise the gs:// path through Lakekeeper. The
      # scenario at tests/e2e/scenarios/gcs-pipeline-k8s/ stays in the
      # repo as a skeleton for whichever path lands first.

      - name: Dump pod state on failure
        if: failure()
        run: |
          echo "=== nodes ===" && kubectl get nodes -o wide || true
          echo "=== pods ===" && kubectl -n datuplet-e2e get pods -o wide || true
          for pod in $(kubectl -n datuplet-e2e get pods -o name 2>/dev/null); do
            echo "=== describe $pod ==="
            kubectl -n datuplet-e2e describe "$pod" || true
            echo "=== logs $pod (all containers, last 200 lines) ==="
            kubectl -n datuplet-e2e logs "$pod" --all-containers=true --tail=200 || true
          done

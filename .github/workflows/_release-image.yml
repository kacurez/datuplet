name: release-image

# Reusable: end-to-end release path for ONE image.
# Three jobs in sequence:
#   1. amd64    — native build on ubuntu-latest, push by digest
#   2. arm64    — native build on ubuntu-24.04-arm, push by digest
#   3. manifest — needs both; stitches per-arch digests into a single
#                 tagged multi-arch manifest list (:$VERSION, :v$VERSION,
#                 :$MINOR, :latest — the v-prefixed tag lets stable
#                 ComponentDefinition versions (which must be vX.Y.Z-shaped,
#                 RFC 024 T6.3) resolve to the same image)
#
# Called once per image from release.yml. The parent's run-detail UI
# shows each call as one collapsible row labeled with the image name;
# expanding reveals amd64 / arm64 / manifest.

on:
  workflow_call:
    inputs:
      name:
        description: Image name (also the ghcr.io repo basename)
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile relative to repo root
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  amd64:
    # Image identity has to live in the job name itself. Nested reusable
    # workflows flatten in the parent's run-detail sidebar (per
    # actions/runner architecture), so generic labels like "amd64"
    # become indistinguishable when 5 images call this workflow under
    # the same bucket. The colon syntax mirrors a Docker image tag and
    # survives the sidebar's slash-truncation behavior.
    name: ${{ inputs.name }}:amd64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ inputs.name }}-amd64

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ inputs.name }}-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  arm64:
    name: ${{ inputs.name }}:arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ inputs.name }}-arm64

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ inputs.name }}-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: ${{ inputs.name }}:manifest
    needs: [amd64, arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve version tags
        id: meta
        run: |
          set -eu
          REF="${GITHUB_REF#refs/tags/}"          # v0.1.3
          VERSION="${REF#v}"                        # 0.1.3
          MINOR="${VERSION%.*}"                     # 0.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"

      - name: Download per-arch digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ inputs.name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -eu
          IMG=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.name }}
          cd /tmp/digests
          docker buildx imagetools create \
            -t "$IMG:${{ steps.meta.outputs.version }}" \
            -t "$IMG:v${{ steps.meta.outputs.version }}" \
            -t "$IMG:${{ steps.meta.outputs.minor }}" \
            -t "$IMG:latest" \
            $(printf "${IMG}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.name }}:${{ steps.meta.outputs.version }}

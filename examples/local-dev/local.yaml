# Local development configuration for Data Gateway
mode: local

data_dir: ./data

component:
  inputs:
    products: inputs/products    # Relative to data_dir

  outputs:
    filtered: outputs/filtered

  config:
    operations:
      - type: filter
        column: price
        op: ">"
        value: 100

local:
  input_format: auto           # auto, csv, parquet, json
  output_format: csv           # csv, parquet, json
  chunk_size: 1048576          # 1MB

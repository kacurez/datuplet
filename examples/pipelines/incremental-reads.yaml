# Incremental Reads — stdout-writer reads only the rows written to
# raw.products in the last minute, using the "since" duration filter
#
# Components: stdout-writer
# Prerequisites: running Datuplet install (lakekeeper + pipeline-api), see docs/install.md
# Prerequisites: run processors-drop first to create raw.products
#
# Run it:
#   CLI:   datuplet pipeline put -f examples/pipelines/incremental-reads.yaml
#          datuplet trigger incremental-reads
#   UI:    Pipelines → New → paste this YAML → Save → Trigger
#   REST:  PUT /api/v1/projects/{pid}/pipelines/incremental-reads (see docs/pipeline-api.md)
name: incremental-reads
stages:
  - name: read
    components:
      - name: stdout-writer
        component: stdout-writer
        inputs:
          tables:
            - bucket: raw
              table: products
              since: 1m
        config:
          format: csv

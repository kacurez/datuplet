# Secrets: HTTP Auth — http-json-extractor authenticates against a protected
# API using a secret-backed Authorization header
#
# Components: http-json-extractor
# Prerequisites: running Datuplet install (lakekeeper + pipeline-api), see docs/install.md
# Prerequisites: create the api_token secret referenced below. Secrets are now
# managed per-project (not per-pipeline) via the project-secrets API (see
# docs/pipeline-api.md), or directly with kubectl on the managed
# datuplet-project-secrets Secret in this namespace:
#
#   kubectl create secret generic datuplet-project-secrets \
#     --from-literal=api_token='Bearer <your-token>' \
#     -n datuplet
#
# See docs/secrets.md for the full secret resolution flow.
#
# Run it:
#   CLI:   datuplet pipeline put -f examples/pipelines/secrets-http-auth.yaml
#          datuplet trigger secrets-http-auth
#   UI:    Pipelines → New → paste this YAML → Save → Trigger
#   REST:  PUT /api/v1/projects/{pid}/pipelines/secrets-http-auth (see docs/pipeline-api.md)
name: secrets-http-auth
stages:
  - name: extract
    components:
      - name: http-json-extractor
        component: http-json-extractor
        config:
          url: "https://api.example.com/items"
          headers:
            Authorization: "$[api_token]"
        outputs:
          defaultBucket: raw
          defaultWriteMode: APPEND

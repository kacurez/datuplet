---
# Secrets: HTTP Auth — http-json-extractor authenticates against a protected
# API using a secret-backed Authorization header
#
# Components: http-json-extractor
# Prerequisites: running Datuplet install (lakekeeper + pipeline-api), see docs/install.md
# Prerequisites: create the Secret this Pipeline's secretsRef points at. $[name]
# refs must be a whole scalar (see docs/secrets.md), so the Secret value below
# carries the full header value, "Bearer " prefix included:
#
#   kubectl create secret generic http-auth-secrets \
#     --from-literal=api_token='Bearer <your-token>' \
#     -n datuplet
#
# See docs/secrets.md for the full secret resolution flow.
#
# Run it:
#   UI:      Pipelines → New → paste this YAML → Save → Trigger
#   REST:    see docs/pipeline-api.md "Upload a pipeline" + "Trigger a run"
#   kubectl: kubectl apply -f examples/pipelines/secrets-http-auth.yaml   (applies Pipeline + PipelineRun)
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: secrets-http-auth
  namespace: datuplet
spec:
  secretsRef:
    name: http-auth-secrets

  stages:
    - name: extract
      components:
        - name: http-json-extractor
          image: ghcr.io/kacurez/http-json-extractor:latest
          config:
            url: "https://api.example.com/items"
            headers:
              Authorization: "$[api_token]"
          outputs:
            defaultBucket: raw
            defaultWriteMode: APPEND
---
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: secrets-http-auth-run-1
  namespace: datuplet
spec:
  pipelineRef:
    name: secrets-http-auth

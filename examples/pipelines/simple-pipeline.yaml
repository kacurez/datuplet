# Simple Pipeline Example (CLI mode)
#
# This is the simplest pipeline: extract CSV data to the data lake.
# Run with: ./bin/datuplet run examples/pipelines/simple-pipeline.yaml
#
# Prerequisites:
# - MinIO running: make start-minio
# - Components built: make build-components
#
# Environment variables for storage (optional, defaults shown):
#   DATUPLET_STORAGE_ENDPOINT=localhost:9000
#   DATUPLET_STORAGE_BUCKET=datuplet
#   DATUPLET_STORAGE_ACCESS_KEY=minioadmin
#   DATUPLET_STORAGE_SECRET_KEY=minioadmin
#
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: simple-pipeline

spec:
  # Gateway settings (optional - these are defaults)
  gateway:
    chunkSize: 33554432 # 32MB - component streaming chunks
    bufferSize: 67108864 # 64MB - gateway memory buffer
    rowGroupSize: 67108864 # 64MB - Parquet row groups
    targetFileSize: 134217728 # 128MB - Parquet file rotation

  stages:
    - name: extract
      components:
        - name: data-generator
          image: ghcr.io/kacurez/data-generator:latest
          config:
            tables:
              - name: products
                random:
                  schema:
                    id: int
                    name: string
                    category: string
                    price: double
                    quantity: int
                  limit:
                    rowsCount: 10
          # Dynamic table creation: any table can be written to the 'raw' bucket
          outputs:
            defaultBucket: raw
            defaultWriteMode: APPEND

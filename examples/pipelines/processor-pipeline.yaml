# Processor Pipeline Example (CLI mode)
#
# This example demonstrates gateway processors that transform data
# before it's written to the data lake.
#
# Run with: ./bin/datuplet run examples/pipelines/processor-pipeline.yaml
#
# This pipeline:
# 1. Extracts CSV data
# 2. Applies a "drop" processor to remove price and quantity columns
# 3. Writes only id, name, category to the data lake
# 4. Reads back and outputs to stdout
#
# Environment variables for storage (optional, defaults shown):
#   DATUPLET_STORAGE_ENDPOINT=localhost:9000
#   DATUPLET_STORAGE_BUCKET=datuplet
#   DATUPLET_STORAGE_ACCESS_KEY=minioadmin
#   DATUPLET_STORAGE_SECRET_KEY=minioadmin
#
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: processor-pipeline

spec:
  gateway:
    chunkSize: 33554432       # 32MB
    bufferSize: 67108864      # 64MB
    rowGroupSize: 67108864    # 64MB
    targetFileSize: 134217728 # 128MB

  stages:
    # Stage 1: Extract data with processor
    - name: extract
      components:
        - name: data-generator
          image: datuplet/data-generator:latest
          config:
            tables:
              - name: products
                random:
                  schema:
                    id: int
                    name: string
                    category: string
                    price: double
                    quantity: int
                  limit:
                    rowsCount: 10
          # Output with drop processor - removes price and quantity columns
          outputs:
            defaultBucket: raw
            defaultWriteMode: FULL_LOAD
            processors:
              - type: drop
                columns:
                  - price
                  - quantity

    # Stage 2: Output results (only id, name, category remain)
    - name: load
      components:
        - name: stdout-writer
          image: datuplet/stdout-writer:latest
          # Read from 'raw' bucket
          inputs:
            buckets:
              - raw
          config:
            format: json

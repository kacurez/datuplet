# Full ETL — extract JSON from a public API, then SQL-transform into a curated table
#
# Components: http-json-extractor, sql-transform
# Prerequisites: running Datuplet install (lakekeeper + pipeline-api), see docs/install.md
#
# Run it:
#   CLI:   datuplet pipeline put -f examples/pipelines/full-etl.yaml
#          datuplet trigger full-pipeline
#   UI:    Pipelines → New → paste this YAML → Save → Trigger
#   REST:  PUT /api/v1/projects/{pid}/pipelines/full-pipeline (see docs/pipeline-api.md)
name: full-pipeline
gateway:
  chunkSize: 33554432       # 32MB
  bufferSize: 67108864      # 64MB
  rowGroupSize: 67108864    # 64MB
  targetFileSize: 134217728 # 128MB

stages:
  - name: extract
    components:
      - name: json-extractor
        component: http-json-extractor
        config:
          url: "https://jsonplaceholder.typicode.com/posts"
        outputs:
          tables:
            - name: data
              bucket: staging
              writeMode: APPEND

  - name: transform
    components:
      - name: transformer
        component: sql-transform
        inputs:
          tables:
            - bucket: staging
              table: data
        outputs:
          tables:
            - name: enriched_posts
              bucket: curated
              writeMode: APPEND
        config:
          sql: |
            CREATE TABLE enriched_posts AS
            SELECT id, title, body
            FROM data;

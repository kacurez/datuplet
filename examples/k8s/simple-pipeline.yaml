---
# Simple Pipeline Example for Kubernetes
#
# This example demonstrates a basic pipeline that extracts data from an
# API and writes it to a table. The pipeline relies on lakekeeper (the
# Iceberg REST catalog) for table allocation + vended-creds (RFC 007
# Slice 9). DG fetches per-table STS credentials at write time;
# TableCommit talks directly to lakekeeper for the metadata commit.
#
# Prerequisites:
# - Lakekeeper Deployment running in the `lakekeeper` namespace
# - pipeline-api running in `datuplet` (publishes the JWKS endpoint
#   lakekeeper authenticates against)
#
apiVersion: datuplet.io/v1
kind: Pipeline
metadata:
  name: simple-pipeline
  namespace: datuplet
spec:
  # Gateway settings (optional - these are defaults)
  gateway:
    chunkSize: 33554432       # 32MB - component streaming chunks
    bufferSize: 67108864      # 64MB - gateway memory buffer
    rowGroupSize: 67108864    # 64MB - Parquet row groups
    targetFileSize: 134217728 # 128MB - Parquet file rotation

  stages:
    - name: extract
      components:
        - name: json-extractor
          image: ghcr.io/kacurez/http-json-extractor:latest
          config:
            url: "https://jsonplaceholder.typicode.com/posts"
          # Dynamic table creation: component can create any table under 'raw' bucket
          outputs:
            defaultBucket: raw
            defaultWriteMode: APPEND

---
# PipelineRun to execute the pipeline
apiVersion: datuplet.io/v1
kind: PipelineRun
metadata:
  name: simple-pipeline-run-1
  namespace: datuplet
spec:
  pipelineRef:
    name: simple-pipeline
  parameters: {}
